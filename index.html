<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGI-ORAL+ V5</title>
    
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f3f4f6;
        }

        /* Animation Scintillante pour le bouton RETOUR */
        @keyframes glowing {
            0% { box-shadow: 0 0 5px #ef4444; transform: scale(1); }
            50% { box-shadow: 0 0 20px #ef4444; transform: scale(1.05); }
            100% { box-shadow: 0 0 5px #ef4444; transform: scale(1); }
        }

        .modal-enter { opacity: 0; transform: scale(0.9); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: opacity 300ms, transform 300ms; }
        .modal-exit { opacity: 1; }
        .modal-exit-active { opacity: 0; transform: scale(0.9); transition: opacity 300ms, transform 300ms; }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-scale-in {
            animation: scaleIn 0.2s ease-out forwards;
        }

        /* Styles des barres de défilement */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 3px; }

        /* Style spécifique pour la barre de défilement horizontale de la zone des Jurys */
        .horizontal-scrollbar::-webkit-scrollbar { height: 12px; width: 12px; }
        .horizontal-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 6px; }
        .horizontal-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; border: 2px solid #f1f5f9; }
        .horizontal-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* --- STYLES D'IMPRESSION STRICTS --- */
        .A4-sheet {
            width: 210mm;
            min-height: 297mm;
            height: auto;
            padding: 10mm;
            background: white;
            margin: 0 auto 2rem auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden; 
        }
        
        .A4-landscape-sheet {
            width: 297mm;
            min-height: 210mm;
            height: auto;
            padding: 10mm;
            background: white;
            margin: 0 auto 2rem auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        @media print {
            @page { size: A4; margin: 0; }
            body, html { margin: 0; padding: 0; background: white; height: 100%; width: 100%; }
            .no-print, .print-sidebar { display: none !important; }
            .print-modal { position: static !important; display: block !important; background: white !important; height: auto !important; width: 100% !important; overflow: visible !important; }
            .print-content-area { margin: 0 !important; padding: 0 !important; height: auto !important; width: 100% !important; background: white !important; display: block !important; overflow: visible !important; }
            .print-wrapper { max-width: none !important; box-shadow: none !important; margin: 0 !important; width: 100% !important; }
            .A4-sheet, .A4-landscape-sheet { margin: 0 !important; box-shadow: none !important; page-break-after: always !important; break-after: page !important; page-break-inside: avoid !important; height: auto !important; min-height: 0 !important; overflow: visible !important; }
            .A4-sheet:last-child, .A4-landscape-sheet:last-child { page-break-after: auto !important; break-after: auto !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- ICONS --- */
        const IconBase = ({ children, size = 24, color = "currentColor", className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Icons = {
            Save: (props) => <IconBase {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconBase>,
            Upload: (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconBase>,
            Trash2: (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>,
            Printer: (props) => <IconBase {...props}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></IconBase>,
            Users: (props) => <IconBase {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>,
            Clock: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>,
            FileUp: (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 12v6"/><path d="M9 15l3-3 3 3"/></IconBase>,
            Download: (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>,
            RotateCcw: (props) => <IconBase {...props}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></IconBase>,
            Edit: (props) => <IconBase {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></IconBase>,
            CheckCircle: (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>,
            ClipboardList: (props) => <IconBase {...props}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></IconBase>,
            Calendar: (props) => <IconBase {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconBase>,
            ChevronUp: (props) => <IconBase {...props}><polyline points="18 15 12 9 6 15"/></IconBase>,
            ChevronDown: (props) => <IconBase {...props}><polyline points="6 9 12 15 18 9"/></IconBase>,
            Sparkles: (props) => <IconBase {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconBase>,
            Zap: (props) => <IconBase {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconBase>,
            Coffee: (props) => <IconBase {...props}><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></IconBase>,
            Minus: (props) => <IconBase {...props}><line x1="5" y1="12" x2="19" y2="12"/></IconBase>,
            Plus: (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>,
            PieChart: (props) => <IconBase {...props}><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></IconBase>,
            Search: (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></IconBase>,
            HandHeart: (props) => <IconBase {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" /></IconBase>,
            FileText: (props) => <IconBase {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></IconBase>,
            Type: (props) => <IconBase {...props}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></IconBase>,
            HelpCircle: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>,
            Folder: (props) => <IconBase {...props}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></IconBase>,
            Laptop: (props) => <IconBase {...props}><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/></IconBase>,
            Stamp: (props) => <IconBase {...props}><path d="M12 2L12 22"/><path d="M12 2L2 7L12 12L22 7L12 2Z"/><path d="M2 17L12 22L22 17"/><path d="M2 12L12 17L22 12"/></IconBase>,
            Grid: (props) => <IconBase {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></IconBase>,
            Star: (props) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>
        };

        const { Save, Upload, Trash2, Printer, Users, Clock, FileUp, Download, RotateCcw, Edit, CheckCircle, ClipboardList, Calendar, ChevronUp, ChevronDown, Sparkles, Zap, Coffee, Minus, Plus, PieChart, Search, HandHeart, FileText, Type, HelpCircle, Folder, Laptop, Stamp, Grid, Star } = Icons;

        /* --- HELPERS --- */
        const normalizeText = (text) => text ? text.toString().toUpperCase().trim() : "";

        const isStudentTT = (student) => {
            if (!student || student.TT === undefined || student.TT === null) return false;
            if (student.TT === true) return true;
            const norm = student.TT.toString().toUpperCase().trim();
            return norm === 'OUI' || norm === 'O' || norm === 'VRAI' || norm.includes('TIERS') || norm === 'TRUE';
        };

        const isStudentPC = (student) => {
            if (!student || student.PC === undefined || student.PC === null) return false;
            if (student.PC === true) return true;
            const norm = student.PC.toString().toUpperCase().trim();
            return norm === 'OUI' || norm === 'O' || norm === 'VRAI' || norm === 'TRUE';
        };

        const addMinutes = (timeStr, minutesToAdd) => {
            if (!timeStr) return "";
            const [h, m] = timeStr.split(':').map(Number);
            const date = new Date();
            date.setHours(h);
            date.setMinutes(m + minutesToAdd);
            return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        };

        const calculateStudentTimes = (students, startTime, examSettings) => {
            let currentTime = startTime;
            let lastGroup = null;
            let lastGroupStart = null;
            let lastGroupEnd = null;

            return students.map(student => {
                if (student.isBreak) {
                    const duration = student.duration !== undefined ? student.duration : 15;
                    const start = currentTime;
                    const end = addMinutes(start, duration);
                    currentTime = end; 
                    lastGroup = null; lastGroupStart = null; lastGroupEnd = null;
                    return { ...student, timeStart: start, timeEnd: end };
                }

                if (student.isJuryChange) {
                    lastGroup = null; lastGroupStart = null; lastGroupEnd = null;
                    return { ...student, timeStart: currentTime, timeEnd: currentTime };
                }

                const rawGroup = student.GROUPE ? student.GROUPE.toString().trim() : "";
                const isGroup = rawGroup.length > 0 && rawGroup.toUpperCase() !== "NON";
                const isTT = isStudentTT(student);

                let start, end;

                if (isGroup && rawGroup === lastGroup) {
                    start = lastGroupStart;
                    end = lastGroupEnd;
                } else {
                    start = currentTime;
                    
                    let duration = student.duration;
                    let synthesisTime = examSettings?.synthesisTime ?? 5; 

                    if (duration === undefined) {
                        duration = isGroup ? (examSettings?.durationGroup ?? 25) : (examSettings?.durationIndiv ?? 20);
                        if (isTT) duration += (examSettings?.ttBonus ?? 5);
                    }

                    end = addMinutes(start, duration);
                    currentTime = addMinutes(end, synthesisTime);

                    if (isGroup) {
                        lastGroup = rawGroup;
                        lastGroupStart = start;
                        lastGroupEnd = end;
                    } else {
                        lastGroup = null; lastGroupStart = null; lastGroupEnd = null;
                    }
                }

                return { ...student, timeStart: start, timeEnd: end };
            });
        };

        const timeToMinutes = (t) => {
            if (!t) return 0;
            const [h, m] = t.split(':').map(Number);
            return (h * 60) + (m || 0);
        };

        const minutesToHHMM = (mins) => {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            const hh = String(h).padStart(2,'0');
            const mm = String(m).padStart(2,'0');
            return `${hh}:${mm}`;
        };

        const formatMinutesHM = (mins) => {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return `${h}h${String(m).padStart(2,'0')}`;
        };

        const calculateJuryLoad = (jury, startTime, examSettings) => {
            const studentsWithTime = calculateStudentTimes(jury.students || [], startTime, examSettings);
            
            let totalMinutes = 0;
            let ttCount = 0;
            let lastEnd = startTime;
            
            let realStudentCount = 0;
            const uniqueSlots = new Set();

            studentsWithTime.forEach(s => {
                if (s.isBreak || s.isJuryChange) return;
                
                realStudentCount++;
                const slotKey = s.timeStart + '-' + s.timeEnd;
                
                if (!uniqueSlots.has(slotKey)) {
                    uniqueSlots.add(slotKey);
                    totalMinutes += Math.max(0, timeToMinutes(s.timeEnd) - timeToMinutes(s.timeStart));
                }
                
                if (!lastEnd || timeToMinutes(s.timeEnd) > timeToMinutes(lastEnd)) {
                    lastEnd = s.timeEnd;
                }

                if (isStudentTT(s)) ttCount++;
            });

            return {
                juryId: jury.id,
                room: jury.room || '',
                studentCount: realStudentCount,
                passageCount: uniqueSlots.size, 
                totalMinutes,
                ttCount,
                endTime: lastEnd || startTime
            };
        };

        const getLoadStatus = (juryMinutes, avgMinutes) => {
            if (!avgMinutes || avgMinutes <= 0) return { label: '—', cls: 'text-slate-600 bg-slate-100 border-slate-200' };
            const ratio = juryMinutes / avgMinutes;
            if (ratio <= 1.10) return { label: 'Équilibré', cls: 'text-emerald-700 bg-emerald-50 border-emerald-200' };
            if (ratio <= 1.20) return { label: 'Sous tension', cls: 'text-orange-700 bg-orange-50 border-orange-200' };
            return { label: 'Surchargé', cls: 'text-red-700 bg-red-50 border-red-200' };
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return "Date non définie";
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                const date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                return date.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            }
            const date = new Date(dateStr);
            return date.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        };

        const downloadCSV = (data, filename) => {
            if (!data || data.length === 0) return;
            const headers = Object.keys(data[0]).join(";");
            const rows = data.map(row => 
                Object.values(row).map(value => {
                    const str = String(value || '');
                    return `"${str.replace(/"/g, '""')}"`;
                }).join(";")
            );
            const csvContent = "\uFEFF" + [headers, ...rows].join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        const chunkArray = (array, size) => {
            const chunks = [];
            for (let i = 0; i < array.length; i += size) {
                chunks.push(array.slice(i, i + size));
            }
            return chunks;
        };

        /* --- COMPONENTS --- */

        const FileUploader = ({ label, onDataLoaded, fields, color = "amber" }) => {
             const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const fileExtension = file.name.split('.').pop().toLowerCase();
                
                if (fileExtension === 'csv') {
                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        transformHeader: (h) => h.trim(),
                        complete: (results) => {
                            onDataLoaded(results.data);
                        }
                    });
                } else if (fileExtension === 'xls' || fileExtension === 'xlsx') {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        const data = new Uint8Array(evt.target.result);
                        const wb = XLSX.read(data, { type: 'array' });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const jsonData = XLSX.utils.sheet_to_json(ws, { defval: "" });
                        
                        const normalizedData = jsonData.map(row => {
                            const newRow = {};
                            for (let key in row) {
                                newRow[key.trim()] = row[key];
                            }
                            return newRow;
                        });
                        
                        onDataLoaded(normalizedData);
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    alert("Format non supporté. Veuillez importer un fichier CSV, XLS ou XLSX.");
                }
            };

            const colorClasses = {
                indigo: "border-indigo-200 bg-indigo-50/50 hover:bg-indigo-100/80 text-indigo-700",
                amber: "border-amber-200 bg-amber-50/50 hover:bg-amber-100/80 text-amber-700"
            };

            return (
                <div className={`relative group overflow-hidden border-2 border-dashed rounded-xl transition-all duration-300 cursor-pointer ${colorClasses[color]}`}>
                    <label className="flex flex-col items-center justify-center p-4 h-full w-full cursor-pointer gap-2">
                        <div className="bg-white p-2.5 rounded-full shadow-sm group-hover:scale-110 group-hover:shadow-md transition-all duration-300">
                            <FileUp size={20} className={`text-${color}-500`} />
                        </div>
                        <span className="font-bold text-sm text-center">{label}</span>
                        <span className="text-[10px] opacity-60 font-medium text-center">Format CSV<br/>Colonnes : {fields.slice(0, 3).join(', ')}...</span>
                        <input type="file" accept=".csv, .xls, .xlsx, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" onChange={handleFile} className="hidden" />
                    </label>
                </div>
            );
        };

        const StudentCard = ({ student, draggable, onDragStart, onUpdateDuration, onGeneralEdit, examSettings, onDelete }) => {
            if (student.isBreak) {
                return (
                    <div 
                        draggable={draggable}
                        onDragStart={(e) => onDragStart(e, student)}
                        className="p-2 mb-2 rounded border border-orange-200 bg-orange-50 shadow-sm cursor-grab active:cursor-grabbing text-sm flex flex-col gap-1 relative group"
                    >
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2 text-orange-700 font-bold">
                                <Coffee size={18} />
                                <span>PAUSE</span>
                            </div>
                            <div className="flex items-center gap-2">
                                {student.timeStart && student.timeEnd && (
                                    <div className="text-xs font-mono font-bold text-orange-800 bg-orange-100 px-2 py-0.5 rounded border border-orange-200">
                                        {student.timeStart} - {student.timeEnd}
                                    </div>
                                )}
                                {onDelete && (
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); onDelete(student.id); }} 
                                        className="text-orange-400 hover:text-red-600 transition-colors bg-white hover:bg-red-50 rounded p-1 shadow-sm border border-orange-200"
                                        title="Supprimer la pause"
                                    >
                                        <Trash2 size={14} />

                setProfs(prev => [...prev, {

                    PRENOM: newProf.PRENOM.charAt(0).toUpperCase() + newProf.PRENOM.slice(1),

                <div className="fixed inset-0 z-[80] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">

        const TemplateEditor = ({ mode, template, onClose, onUpdate }) => {

                                {mode === 'PROFS' && <span>Spécifique Profs : {'{CIV}'}, {'{HEURE_DEBUT}'}.</span>}
                                {mode === 'STUDENTS' && <span>Spécifique Élèves : {'{SALLE}'}, {'{HEURE}'}, {'{THEME}'}, {'{LANGUE}'}, {'{PARCOURS}'}.</span>}

        const PrintView = ({ juries, profs, onClose, settings, schoolName, schoolCity, schoolLogo, schoolStamp, sessionYear, templates, setTemplates }) => {
            const [viewMode, setViewMode] = useState('STUDENTS'); 
            const [showTemplateEditor, setShowTemplateEditor] = useState(false);

            const startTime = settings?.startTime || '08:00';
            const examDate = settings?.date ? formatDate(settings.date) : "Date non définie";

            const customTitle = settings?.examName || "Oral Personnalisé";
            const examLabel = customTitle.trim() ? customTitle : 'ORAL PERSONNALISÉ';
            const examFullName = customTitle.trim() ? customTitle : 'Épreuve Orale';

            const renderTemplateText = (text, data) => {
                if (!text) return null;
                let content = text;
                Object.keys(data).forEach(key => {
                    const regex = new RegExp(`{${key}}`, 'g');
                    content = content.replace(regex, data[key] || '');
                });
                
                const parts = content.split(/(\*\*.*?\*\*)/g);
                return (
                    <div className="whitespace-pre-line">
                        {parts.map((part, i) => {
                            if (part.startsWith('**') && part.endsWith('**')) {
                                return <strong key={i}>{part.slice(2, -2)}</strong>;
                            }
                            return <span key={i}>{part}</span>;
                        })}
                    </div>
                );
            };

            const handleUpdateTemplate = (mode, field, value) => {
                setTemplates(prev => ({
                    ...prev,
                    [mode]: {
                        ...prev[mode],
                        [field]: value
                    }
                }));
            };

            const getAllAssignedStudents = () => {
                let all = [];
                Object.values(juries).forEach(jury => {
                    const timedStudents = calculateStudentTimes(jury.students, startTime, settings);
                    let currentProf1 = jury.prof1Id;
                    let currentProf2 = jury.prof2Id;

                    timedStudents.forEach(s => {
                        if (s.isJuryChange) {
                            currentProf1 = s.prof1Id;
                            currentProf2 = s.prof2Id;
                        } else if (!s.isBreak) {
                            const p1 = profs.find(p => p.id === currentProf1);
                            const p2 = profs.find(p => p.id === currentProf2);
                            all.push({
                                ...s,
                                juryId: jury.id,
                                room: jury.room,
                                time: s.timeStart, 
                                prof1: p1 ? `${p1.NOM} ${p1.PRENOM}` : 'Non assigné',
                                prof2: p2 ? `${p2.NOM} ${p2.PRENOM}` : 'Non assigné'
                            });
                        }
                    });
                });
                return all.sort((a,b) => a.NOM.localeCompare(b.NOM));
            };

            const getProfAssignments = () => {
                const assignmentsMap = {};
                
                Object.values(juries).forEach(jury => {
                    const timedStudents = calculateStudentTimes(jury.students, startTime, settings);
                    let currentProf1 = jury.prof1Id;
                    let currentProf2 = jury.prof2Id;
                    let currentStart = startTime;
                    
                    const closeSegment = (profId, role, start, end) => {
                        if (!profId || start === end) return;
                        if (!assignmentsMap[profId]) assignmentsMap[profId] = [];
                        assignmentsMap[profId].push({ role, juryId: jury.id, room: jury.room, start, end });
                    };

                    timedStudents.forEach(s => {
                        if (s.isJuryChange) {
                            closeSegment(currentProf1, 'Examinateur 1', currentStart, s.timeStart);
                            closeSegment(currentProf2, 'Examinateur 2', currentStart, s.timeStart);
                            currentProf1 = s.prof1Id;
                            currentProf2 = s.prof2Id;
                            currentStart = s.timeStart;
                        }
                    });
                    
                    const finalEnd = timedStudents.length > 0 ? timedStudents[timedStudents.length - 1].timeEnd : startTime;
                    closeSegment(currentProf1, 'Examinateur 1', currentStart, finalEnd);
                    closeSegment(currentProf2, 'Examinateur 2', currentStart, finalEnd);
                });

                return profs.map(p => ({
                    ...p,
                    segments: assignmentsMap[p.id] || []
                })).filter(p => p.segments.length > 0).sort((a,b) => a.NOM.localeCompare(b.NOM));
            };

            const getAeshAssignments = () => {
                const assignments = {};
                const processedStudentIds = new Set(); 
                const processedStudentNames = new Set();
                
                Object.values(juries).forEach(jury => {
                    const timedStudents = calculateStudentTimes(jury.students, startTime, settings);
                    timedStudents.forEach(s => {
                        if (!s.isBreak && !s.isJuryChange && s.AESH_NOM) {
                            if (processedStudentIds.has(s.id)) return;
                            
                            const nameKey = `${s.NOM}-${s.PRENOM}`.toUpperCase();
                            if (processedStudentNames.has(nameKey)) return;

                            processedStudentIds.add(s.id);
                            processedStudentNames.add(nameKey);

                            const aeshNom = (s.AESH_NOM || '').trim().toUpperCase();
                            const aeshPrenom = (s.AESH_PRENOM || '').trim().toUpperCase();
                            const key = `${aeshNom} ${aeshPrenom}`.trim();
                            
                            if (!key) return;

                            if (!assignments[key]) {
                                assignments[key] = {
                                    nom: (s.AESH_NOM || '').trim(),
                                    prenom: (s.AESH_PRENOM || '').trim(),
                                    missions: []
                                };
                            }
                            assignments[key].missions.push({
                                student: s,
                                time: s.timeStart,
                                room: jury.room,
                                juryId: jury.id
                            });
                        }
                    });
                });
                
                Object.values(assignments).forEach(a => {
                    a.missions.sort((x, y) => x.time.localeCompare(y.time));
                });

                return Object.values(assignments).sort((a,b) => a.nom.localeCompare(b.nom));
            };

            const getJuryAllProfNames = (jury) => {
                const profIds = new Set();
                if (jury.prof1Id) profIds.add(jury.prof1Id);
                if (jury.prof2Id) profIds.add(jury.prof2Id);
                jury.students.forEach(s => {
                    if (s.isJuryChange) {
                        if (s.prof1Id) profIds.add(s.prof1Id);
                        if (s.prof2Id) profIds.add(s.prof2Id);
                    }
                });
                return Array.from(profIds).map(id => {
                    const p = profs.find(x => x.id === id);
                    return p ? `${p.NOM} ${p.PRENOM}` : '';
                }).filter(Boolean).join(', ');
            }

            const getJuryExaminerBlocks = (jury) => {
                const timedStudents = calculateStudentTimes(jury.students, startTime, settings);
                if (timedStudents.length === 0) {
                    if (jury.prof1Id || jury.prof2Id) {
                        return [{ start: startTime, end: startTime, prof1Id: jury.prof1Id, prof2Id: jury.prof2Id }];
                    }
                    return [];
                }

                let currentProf1 = jury.prof1Id;
                let currentProf2 = jury.prof2Id;
                let currentStart = startTime;
                const blocks = [];

                timedStudents.forEach(s => {
                    if (s.isJuryChange) {
                        if (currentStart !== s.timeStart) {
                            blocks.push({
                                start: currentStart,
                                end: s.timeStart,
                                prof1Id: currentProf1,
                                prof2Id: currentProf2
                            });
                        }
                        currentProf1 = s.prof1Id;
                        currentProf2 = s.prof2Id;
                        currentStart = s.timeStart;
                    }
                });

                const finalEnd = timedStudents.length > 0 ? timedStudents[timedStudents.length - 1].timeEnd : startTime;
                blocks.push({
                    start: currentStart,
                    end: finalEnd,
                    prof1Id: currentProf1,
                    prof2Id: currentProf2
                });

                return blocks;
            };

            const studentsToPrint = getAllAssignedStudents();
            const profAssignments = getProfAssignments();
            const aeshAssignments = getAeshAssignments();
            const activeJuries = Object.values(juries).filter(j => j.prof1Id || j.prof2Id || j.students.length > 0);
            
            const getGeneralPlanningData = () => {
                const times = new Set();
                const juriesData = [];

                activeJuries.forEach(jury => {
                    const studentsWithTime = calculateStudentTimes(jury.students, startTime, settings);
                    const studentsMap = {};
                    
                    studentsWithTime.forEach(s => {
                        if (!s.isBreak && !s.isJuryChange) {
                            times.add(s.timeStart);
                            if (!studentsMap[s.timeStart]) studentsMap[s.timeStart] = [];
                            studentsMap[s.timeStart].push(s);
                        } else if (s.isBreak) {
                            times.add(s.timeStart);
                            if (!studentsMap[s.timeStart]) studentsMap[s.timeStart] = [];
                            studentsMap[s.timeStart].push(s);
                        }
                    });

                    juriesData.push({
                        id: jury.id,
                        room: jury.room,
                        studentsMap
                    });
                });

                const sortedTimes = Array.from(times).sort();

                const chunkSize = 6;
                const juryChunks = [];
                for (let i = 0; i < juriesData.length; i += chunkSize) {
                    juryChunks.push(juriesData.slice(i, i + chunkSize));
                }

                return { sortedTimes, juryChunks };
            };

            const SidebarButton = ({ mode, icon: Icon, label, onClick, isActive }) => (
                <button 
                    onClick={onClick} 
                    className={`w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 font-bold transition-all ${isActive ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}
                >
                    <Icon size={18} />
                    <span>{label}</span>
                </button>
            );
            
            return (
                <div className="fixed inset-0 bg-slate-900 z-50 flex print-modal overflow-hidden">
                    <div className="w-72 bg-slate-900 text-white flex flex-col h-full border-r border-slate-800 shadow-2xl print-sidebar flex-shrink-0">
                        <div className="p-6 border-b border-slate-800 bg-slate-950/50">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="bg-indigo-500/20 p-2 rounded-lg"><Printer size={24} className="text-indigo-400" /></div>
                                <h2 className="text-xl font-black tracking-tight">IMPRESSION</h2>
                            </div>
                            <div className="text-xs text-slate-400 font-medium uppercase tracking-widest pl-1">{examLabel} {sessionYear}</div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
                            <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-2 px-2">Documents</div>
                            <SidebarButton mode="STUDENTS" icon={Users} label="Convocations Élèves" isActive={viewMode === 'STUDENTS'} onClick={() => setViewMode('STUDENTS')} />
                            <SidebarButton mode="PROFS" icon={Users} label="Convocations Profs" isActive={viewMode === 'PROFS'} onClick={() => setViewMode('PROFS')} />
                            <SidebarButton mode="AESH" icon={HandHeart} label="Missions AESH" isActive={viewMode === 'AESH'} onClick={() => setViewMode('AESH')} />
                            
                            <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-2">Jurys & Salles</div>
                            <SidebarButton mode="PV" icon={FileText} label="Procès Verbaux" isActive={viewMode === 'PV'} onClick={() => setViewMode('PV')} />
                            <SidebarButton mode="POCHETTES" icon={Folder} label="Pochettes Jury" isActive={viewMode === 'POCHETTES'} onClick={() => setViewMode('POCHETTES')} />
                            <SidebarButton mode="JURIES" icon={Calendar} label="Plannings Jury" isActive={viewMode === 'JURIES'} onClick={() => setViewMode('JURIES')} />
                            <SidebarButton mode="JURIES_PROFS" icon={Users} label="Planning Examinateurs" isActive={viewMode === 'JURIES_PROFS'} onClick={() => setViewMode('JURIES_PROFS')} />
                            <SidebarButton mode="GENERAL" icon={Grid} label="Planning Général" isActive={viewMode === 'GENERAL'} onClick={() => setViewMode('GENERAL')} />
                            
                            <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-2">Administration</div>
                            <SidebarButton mode="NOTATION" icon={ClipboardList} label="Feuilles de Notes" isActive={viewMode === 'NOTATION'} onClick={() => setViewMode('NOTATION')} />
                            <SidebarButton mode="EMARGEMENT" icon={CheckCircle} label="Émargement" isActive={viewMode === 'EMARGEMENT'} onClick={() => setViewMode('EMARGEMENT')} />
                        </div>

                        <div className="p-4 border-t border-slate-800 bg-slate-950 space-y-3">
                            {['STUDENTS', 'PROFS', 'AESH'].includes(viewMode) && (
                                <button onClick={() => setShowTemplateEditor(true)} className="w-full bg-slate-800 hover:bg-slate-700 text-white px-4 py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 border border-slate-700 transition-all">
                                    <Edit size={16} /> Personnaliser
                                </button>
                            )}
                            <button onClick={() => window.print()} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-3 rounded-lg font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/20 transition-all">
                                <Printer size={18} /> IMPRIMER
                            </button>
                            <button onClick={onClose} className="w-full bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white px-4 py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 border border-red-900/30 hover:border-red-600 transition-all">
                                <RotateCcw size={16} /> Retour
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 bg-slate-200/50 overflow-auto p-8 print-content-area flex flex-col items-center">
                        <div className="print-wrapper w-full flex flex-col items-center">
                            {viewMode === 'GENERAL' && (
                                <div className="w-full max-w-[297mm]">
                                    <div className="no-print mb-4 p-4 bg-blue-100 text-blue-800 rounded-lg flex items-center gap-3 border border-blue-200 shadow-sm w-full">
                                        <Grid size={24} />
                                        <div>
                                            <strong>Planning Général (Paysage)</strong><br/>
                                            Matrice horaire pour affichage global. <strong>Pensez à régler votre imprimante sur "Paysage" (Landscape).</strong>
                                        </div>
                                    </div>
                                    {getGeneralPlanningData().juryChunks.map((chunk, chunkIndex) => (
                                        <div key={chunkIndex} className="A4-landscape-sheet">
                                            <div className="flex justify-between items-center border-b-2 border-black pb-4 mb-4">
                                                <div className="flex items-center gap-4">
                                                    {schoolLogo && <img src={schoolLogo} alt="Logo" className="h-16 object-contain" />}
                                                    <div>
                                                        <h1 className="text-2xl font-black uppercase text-slate-900">PLANNING GÉNÉRAL {chunkIndex > 0 ? `(Suite ${chunkIndex+1})` : ''}</h1>
                                                        <div className="text-xl font-bold text-blue-800">{examLabel} - Session {sessionYear}</div>
                                                        <div className="text-sm font-bold text-gray-500">{examDate}</div>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="font-bold text-xl text-slate-700">{schoolName}</div>
                                                    <div className="text-slate-500">{schoolCity}</div>
                                                </div>
                                            </div>

                                            <table className="w-full border-collapse border border-black text-xs table-fixed">
                                                <thead>
                                                    <tr className="bg-slate-100">
                                                        <th className="border border-black p-2 w-20 text-center bg-slate-200">Horaire</th>

                    intro: "{CIV} **{NOM}**,\n\nConformément à la réglementation des examens, vous êtes convoqué(e) pour participer aux épreuves **{EPREUVE} Session {SESSION}** en qualité d'examinateur.",
                    instructions: "Déroulement de la mission :\n\n- **H - 15min** : Réunion préparatoire. Récupération des dossiers et bordereaux.\n- **{HEURE_DEBUT}** : Début des interrogations orales selon le planning joint.\n- **Fin** : Délibération du jury et remise des dossiers complets au secrétariat d'examen.",
                    footer: ""
                },
                AESH: {
                    title: "ORDRE DE MISSION AESH",
                    intro: "M./Mme **{NOM} {PRENOM}**,\n\nVous êtes prié(e) d'accompagner les élèves suivants lors des épreuves **{EPREUVE} Session {SESSION}** qui se dérouleront le **{DATE_EXAM}** :",
                    instructions: "Rappel des consignes :\n\n- Présentez-vous devant la salle d'examen 15 minutes avant l'horaire indiqué.\n- Accompagnez l'élève durant le temps de préparation et le temps de passage selon les modalités de son PPS/PAP.\n- Veillez à la confidentialité des échanges.",
                    footer: ""
                }
            });

            const [breakConfig, setBreakConfig] = useState({ time: '10:00', duration: 15 });
            const [searchTerm, setSearchTerm] = useState("");
            const [juries, setJuries] = useState({});

            useEffect(() => {
                const timer = setInterval(() => setCurrentDateTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            /* --- HOOKS ET REFS POUR LE DOUBLE ASCENSEUR --- */
            const topScrollRef = useRef(null);
            const mainScrollRef = useRef(null);
            const contentRef = useRef(null);
            const isSyncingTop = useRef(false);
            const isSyncingMain = useRef(false);
            const [juriesWidth, setJuriesWidth] = useState(0);

            useEffect(() => {
                const observer = new ResizeObserver(entries => {
                    if (entries[0]) {
                        setJuriesWidth(entries[0].target.scrollWidth);
                    }
                });
                if (contentRef.current) {
                    observer.observe(contentRef.current);
                    setJuriesWidth(contentRef.current.scrollWidth);
                }
                return () => observer.disconnect();
            }, [juries]);

            const handleTopScroll = (e) => {
                if (isSyncingMain.current) {
                    isSyncingMain.current = false;
                    return;
                }
                isSyncingTop.current = true;
                if (mainScrollRef.current) {
                    mainScrollRef.current.scrollLeft = e.target.scrollLeft;
                }
            };

            const handleMainScroll = (e) => {
                if (isSyncingTop.current) {
                    isSyncingTop.current = false;
                    return;
                }
                isSyncingMain.current = true;
                if (topScrollRef.current) {
                    topScrollRef.current.scrollLeft = e.target.scrollLeft;
                }
            };
            /* ----------------------------------------------- */
            
            const processStudents = (data) => {
                const processed = data.map((s, i) => ({
                    ...s,
                    id: `STUDENT-${Date.now()}-${i}`,
                    assigned: false,
                    _isTT: isStudentTT(s),
                    _isGroup: (s.GROUPE && s.GROUPE.toString().trim().length > 0 && s.GROUPE.toString().toUpperCase() !== 'NON')
                }));
                
                return [...processed].sort((a,b) => {
                    const gA = (a.GROUPE || '').toString().trim();
                    const gB = (b.GROUPE || '').toString().trim();
                    const isGA = gA && gA.toUpperCase() !== 'NON';
                    const isGB = gB && gB.toUpperCase() !== 'NON';
                    
                    if (isGA && !isGB) return -1;
                    if (!isGA && isGB) return 1;
                    
                    if (isGA && isGB) {
                        const cmp = gA.localeCompare(gB);
                        if (cmp !== 0) return cmp;
                    }
                    return a.NOM.localeCompare(b.NOM);
                });
            };

            const handleProfsLoad = (data) => {
                setProfs(prevProfs => {
                    const updatedProfs = [...prevProfs];
                    let updatedCount = 0;
                    let addedCount = 0;
                    
                    data.forEach((newP, i) => {
                        const normNom = normalizeText(newP.NOM);
                        const normPrenom = normalizeText(newP.PRENOM);
                        if (!normNom && !normPrenom) return;

                        const existingIndex = updatedProfs.findIndex(p => normalizeText(p.NOM) === normNom && normalizeText(p.PRENOM) === normPrenom);
                        
                        if (existingIndex >= 0) {
                            // Mise à jour si le prof existe (Garde l'ID et les affectations aux jurys)
                            updatedProfs[existingIndex] = { ...updatedProfs[existingIndex], ...newP, id: updatedProfs[existingIndex].id };
                            updatedCount++;
                        } else {
                            // Ajout si c'est un nouveau prof
                            updatedProfs.push({ ...newP, id: `PROF-${Date.now()}-${i}` });
                            addedCount++;
                        }
                    });
                    
                    setTimeout(() => alert(`Importation Profs : ${addedCount} ajouté(s), ${updatedCount} mis à jour sans doublons.`), 100);
                    return updatedProfs;
                });
            };

            const handleStudentsLoad = (data) => {
                let updatedCount = 0;
                let addedCount = 0;
                const updatedIdsMap = {};
                const newlyAdded = [];

                setStudents(prevStudents => {
                    const mergedStudents = [...prevStudents];

                    data.forEach((newS, i) => {
                        const normNom = normalizeText(newS.NOM);
                        const normPrenom = normalizeText(newS.PRENOM);
                        if (!normNom && !normPrenom) return;

                        const existingIndex = mergedStudents.findIndex(s => normalizeText(s.NOM) === normNom && normalizeText(s.PRENOM) === normPrenom);

                        if (existingIndex >= 0) {
                            // Mise à jour de l'élève existant (conserve son ID, et son statut s'il est déjà dans un jury)
                            const updatedS = { ...mergedStudents[existingIndex], ...newS, id: mergedStudents[existingIndex].id };
                            updatedS._isTT = isStudentTT(updatedS);
                            updatedS._isGroup = (updatedS.GROUPE && updatedS.GROUPE.toString().trim().length > 0 && updatedS.GROUPE.toString().toUpperCase() !== 'NON');
                            
                            mergedStudents[existingIndex] = updatedS;
                            updatedIdsMap[updatedS.id] = updatedS;
                            updatedCount++;
                        } else {
                            // Ajout d'un nouvel élève
                            const addedS = { ...newS, id: `STUDENT-${Date.now()}-${i}`, assigned: false };
                            addedS._isTT = isStudentTT(addedS);
                            addedS._isGroup = (addedS.GROUPE && addedS.GROUPE.toString().trim().length > 0 && addedS.GROUPE.toString().toUpperCase() !== 'NON');
                            
                            mergedStudents.push(addedS);
                            newlyAdded.push(addedS);
                            addedCount++;
                        }
                    });

                    // Mise à jour réactive de la Liste d'Attente (Pool)
                    setPool(prevPool => {
                        const newPool = prevPool.map(p => updatedIdsMap[p.id] ? updatedIdsMap[p.id] : p);
                        newPool.push(...newlyAdded);
                        
                        return newPool.sort((a,b) => {
                            const gA = (a.GROUPE || '').toString().trim();
                            const gB = (b.GROUPE || '').toString().trim();
                            const isGA = gA && gA.toUpperCase() !== 'NON';
                            const isGB = gB && gB.toUpperCase() !== 'NON';
                            if (isGA && !isGB) return -1;
                            if (!isGA && isGB) return 1;
                            if (isGA && isGB) {
                                const cmp = gA.localeCompare(gB);
                                if (cmp !== 0) return cmp;
                            }
                            return a.NOM.localeCompare(b.NOM);
                        });
                    });

                    // Mise à jour réactive à l'intérieur des Jurys (si l'élève y est déjà placé)
                    setJuries(prevJuries => {
                        const newJuries = { ...prevJuries };
                        Object.keys(newJuries).forEach(jid => {
                            newJuries[jid] = {
                                ...newJuries[jid],
                                students: newJuries[jid].students.map(juryS => {
                                    if (juryS.isBreak || juryS.isJuryChange) return juryS;
                                    return updatedIdsMap[juryS.id] ? { ...juryS, ...updatedIdsMap[juryS.id] } : juryS;
                                })
                            };
                        });
                        return newJuries;
                    });

                    setTimeout(() => alert(`Importation Élèves : ${addedCount} ajouté(s), ${updatedCount} mis à jour sans perte d'affectation.`), 100);
                    return mergedStudents;
                });
            };

            const openGeneralEditModal = (student) => {
                setCurrentStudentForGeneralEdit(student);
                setShowGeneralEditModal(true);
            };

            const saveGeneralStudent = (updatedStudent) => {
                const processedStudent = {
                    ...updatedStudent,
                    _isTT: isStudentTT(updatedStudent),
                    _isGroup: (updatedStudent.GROUPE && updatedStudent.GROUPE.toString().trim().length > 0 && updatedStudent.GROUPE.toString().toUpperCase() !== 'NON')
                };

                const updateLogic = (prev) => prev.map(s => s.id === processedStudent.id ? processedStudent : s);
                setStudents(updateLogic);
                setPool(updateLogic);

                setJuries(prev => {
                    const currentJuries = { ...prev };
                    Object.keys(currentJuries).forEach(jid => {
                        currentJuries[jid].students = currentJuries[jid].students.map(s => s.id === processedStudent.id ? processedStudent : s);
                    });
                    return currentJuries;
                });

                setShowGeneralEditModal(false);
            };

            const handleAutoDistribution = () => {
                const activeJuryIds = Object.keys(juries);

                if (pool.length === 0) { alert("Aucun élève dans la liste d'attente."); return; }
                if (activeJuryIds.length === 0) { alert("Aucun jury configuré."); return; }
                if (!confirm(`Répartir ${pool.length} élèves sur ${activeJuryIds.length} jurys ?`)) return;

                const newJuriesState = JSON.parse(JSON.stringify(juries));
                
                // Group students logic
                const groupsMap = {};
                const singles = [];

                pool.forEach(s => {
                    const gRaw = (s.GROUPE || '').toString().trim();
                    const gName = gRaw.toUpperCase();
                    if (gName && gName !== 'NON') {
                        if (!groupsMap[gName]) groupsMap[gName] = [];
                        groupsMap[gName].push(s);
                    } else {
                        singles.push(s);
                    }
                });

                const unitsToAssign = [];
                Object.keys(groupsMap).sort().forEach(gName => {
                    unitsToAssign.push({ students: groupsMap[gName], isGroup: true, id: `GRP-${gName}` });
                });
                singles.forEach(s => {
                    unitsToAssign.push({ students: [s], isGroup: false, id: s.id });
                });

                unitsToAssign.sort((a, b) => {
                    const hasTT_A = isStudentTT(a.students[0]);
                    const hasTT_B = isStudentTT(b.students[0]);
                    
                    if (hasTT_A === hasTT_B) return a.students[0].NOM.localeCompare(b.students[0].NOM);
                    return hasTT_A ? 1 : -1; 
                });

                unitsToAssign.forEach(unit => {
                    let bestJuryId = null;
                    let minScore = Infinity;

                    activeJuryIds.forEach(juryId => {
                        const jury = newJuriesState[juryId];
                        let score = jury.students.length * 10;

                        if (score < minScore) {
                            minScore = score;
                            bestJuryId = juryId;
                        }
                    });

                    if (bestJuryId) {
                        unit.students.forEach(student => {
                            newJuriesState[bestJuryId].students.push(student);
                        });
                    }
                });

                setJuries(newJuriesState);
                setPool([]);
                alert("Répartition terminée !");
            };

            const handleEmptyJuries = () => {
                if (!confirm("Voulez-vous vraiment vider tous les jurys et remettre les élèves en attente ?")) return;
                
                let studentsRecovered = [];
                Object.values(juries).forEach(jury => {
                    const realStudents = jury.students.filter(s => !s.isBreak && !s.isJuryChange);
                    studentsRecovered = [...studentsRecovered, ...realStudents];
                });

                setPool(prev => [...prev, ...studentsRecovered]);
                setJuries(prev => {
                    const newJuriesType = {};
                    Object.keys(prev).forEach(jid => {
                        newJuriesType[jid] = { ...prev[jid], students: [] };
                    });
                    return newJuriesType;
                });
                
                alert("Jurys vidés et élèves replacés en liste d'attente.");
            };

            const handleAddGlobalBreak = () => {
                if (!confirm(`Ajouter une pause de ${breakConfig.duration} min à ${breakConfig.time} pour TOUS les jurys ?`)) return;
                setJuries(prev => {
                    const currentJuries = { ...prev };
                    const updatedJuries = {};
                    Object.keys(currentJuries).forEach(juryId => {
                        const jury = currentJuries[juryId];
                        const timeline = calculateStudentTimes(jury.students, settings.startTime, settings);
                        let insertIndex = timeline.findIndex(s => s.timeStart >= breakConfig.time);
                        if (insertIndex === -1) insertIndex = jury.students.length;
                        const newPause = { id: `BREAK-${juryId}-${Date.now()}`, isBreak: true, duration: parseInt(breakConfig.duration), NOM: 'PAUSE', PRENOM: '', DIV: '' };
                        const newStudents = [...jury.students];
                        newStudents.splice(insertIndex, 0, newPause);
                        updatedJuries[juryId] = { ...jury, students: newStudents };
                    });
                    return updatedJuries;
                });
            };

            const handleAddJuryChange = (juryId) => {
                setJuries(prev => {
                    const jury = prev[juryId];
                    const newChange = { id: `JCHANGE-${Date.now()}`, isJuryChange: true, prof1Id: '', prof2Id: '' };
                    return { ...prev, [juryId]: { ...jury, students: [...jury.students, newChange] } };
                });
            };

            const handleUpdateJuryChange = (juryId, changeId, field, value) => {
                setJuries(prev => {
                    const jury = prev[juryId];
                    const newStudents = jury.students.map(s => s.id === changeId ? { ...s, [field]: value } : s);
                    return { ...prev, [juryId]: { ...jury, students: newStudents } };
                });
            };

            const handleAddJuryBreak = (juryId) => {
                setJuries(prev => {
                    const jury = prev[juryId];
                    const newPause = { id: `BREAK-${juryId}-${Date.now()}`, isBreak: true, duration: 15, NOM: 'PAUSE', PRENOM: '', DIV: '' };
                    return { ...prev, [juryId]: { ...jury, students: [...jury.students, newPause] } };
                });
            };

            const handleRefreshPersoTimes = () => {
                if (!confirm("Forcer l'application des nouveaux paramètres horaires à tous les candidats (effacera vos ajustements manuels +/-) ?")) return;
                
                setJuries(prev => {
                    const updatedJuries = {};
                    Object.keys(prev).forEach(juryId => {
                        const jury = prev[juryId];
                        const updatedStudents = jury.students.map(s => {
                            if (s.isBreak || s.isJuryChange) return s;
                            const { duration, ...rest } = s;
                            return rest;
                        });
                        updatedJuries[juryId] = { ...jury, students: updatedStudents };
                    });
                    return updatedJuries;
                });

                setPool(prev => prev.map(s => { const { duration, ...rest } = s; return rest; }));
                setStudents(prev => prev.map(s => { const { duration, ...rest } = s; return rest; }));
            };

             useEffect(() => {
                const count = settings.juryCount;
                setJuries(prev => {
                    const newJuries = { ...prev };
                    for (let i = 1; i <= count; i++) {
                        if (!newJuries[i]) newJuries[i] = { id: i, room: `S${i}`, prof1Id: null, prof2Id: null, students: [] };
                    }
                    Object.keys(newJuries).forEach(key => { if (parseInt(key) > count) delete newJuries[key]; });
                    return newJuries;
                });
            }, [settings.juryCount]);

            const updateJury = (id, field, value) => {
                setJuries(prev => ({
                    ...prev,
                    [id]: { ...prev[id], [field]: value }
                }));
            };

            const handleDropStudentToJury = (juryId, student) => {
                if (!student.fromJury) {
                    setPool(prev => prev.filter(s => s.id !== student.id));
                } else {
                    removeStudentFromJury(student.fromJury, student.id, false);
                }
                setJuries(prev => {
                    const jury = prev[juryId];
                    if (jury.students.find(s => s.id === student.id)) return prev;
                    return { ...prev, [juryId]: { ...jury, students: [...jury.students, { ...student, fromJury: undefined }] } };
                });
            };

            const removeStudentFromJury = (juryId, studentId, returnToPool = true) => {
                const jury = juries[juryId];
                if (!jury) return;
                const studentToRemove = jury.students.find(s => s.id === studentId && !s.isJuryChange && !s.isBreak);

                setJuries(prev => {
                    const prevJury = prev[juryId];
                    const newStudents = prevJury.students.filter(s => s.id !== studentId);
                    return { ...prev, [juryId]: { ...prevJury, students: newStudents } };
                });

                if (returnToPool && studentToRemove) {
                    setPool(prev => [studentToRemove, ...prev]);
                }
            };

            const moveStudent = (juryId, studentId, direction) => {
                setJuries(prev => {
                    const jury = prev[juryId];
                    const studentsList = [...jury.students];
                    const index = studentsList.findIndex(s => s.id === studentId);
                    if (index === -1) return prev;
                    if (direction === -1 && index === 0) return prev;
                    if (direction === 1 && index === studentsList.length - 1) return prev;
                    const temp = studentsList[index];
                    studentsList[index] = studentsList[index + direction];
                    studentsList[index + direction] = temp;
                    return { ...prev, [juryId]: { ...jury, students: studentsList } };
                });
            };

            const handleUpdateStudentInJury = (juryId, studentId, duration) => {
                setJuries(prev => {
                    const jury = prev[juryId];
                    const newStudents = jury.students.map(s => s.id === studentId ? { ...s, duration: duration } : s);
                    return { ...prev, [juryId]: { ...jury, students: newStudents } };
                });
            };

            const exportData = (type) => {
                if (type === 'PROFS') {
                    const assignmentsMap = {};
                    
                    Object.values(juries).forEach(jury => {
                        const timedStudents = calculateStudentTimes(jury.students, settings.startTime, settings);
                        let currentProf1 = jury.prof1Id;
                        let currentProf2 = jury.prof2Id;
                        let currentStart = settings.startTime;
                        
                        const record = (profId, start, end) => {
                            if (!profId || start === end) return;
                            if (!assignmentsMap[profId]) assignmentsMap[profId] = [];
                            assignmentsMap[profId].push(`Jury ${jury.id} (${start}-${end})`);
                        };

                        timedStudents.forEach(s => {
                            if (s.isJuryChange) {
                                record(currentProf1, currentStart, s.timeStart);
                                record(currentProf2, currentStart, s.timeStart);
                                currentProf1 = s.prof1Id;
                                currentProf2 = s.prof2Id;
                                currentStart = s.timeStart;
                            }
                        });
                        const finalEnd = timedStudents.length > 0 ? timedStudents[timedStudents.length-1].timeEnd : settings.startTime;
                        record(currentProf1, currentStart, finalEnd);
                        record(currentProf2, currentStart, finalEnd);
                    });

                    const data = profs.map(p => ({
                        CIV: p.CIV || '', NOM: p.NOM, PRENOM: p.PRENOM, MATIERE: p.MATIERE,
                        AFFECTATIONS: assignmentsMap[p.id] ? assignmentsMap[p.id].join(' | ') : 'NON AFFECTÉ'
                    }));
                    downloadCSV(data, `export_profs_perso_${sessionYear}.csv`);
                } 
                else if (type === 'STUDENTS') {
                    let rows = [];
                    Object.values(juries).forEach(jury => {
                        const timedStudents = calculateStudentTimes(jury.students, settings.startTime, settings);
                        timedStudents.forEach(s => {
                            if(s.isBreak || s.isJuryChange) return;
                            rows.push({
                                NOM: s.NOM, PRENOM: s.PRENOM, DIV: s.DIV,
                                TT: isStudentTT(s) ? 'OUI' : 'NON',
                                AESH_NOM: s.AESH_NOM || '', AESH_PRENOM: s.AESH_PRENOM || '',
                                GROUPE: s.GROUPE || '',
                                THEME: s.THEME || '', LANGUE: s.LANGUE || '', PARCOURS: s.PARCOURS || '',
                                JURY: jury.id, SALLE: jury.room,
                                HEURE_PASSAGE: s.timeStart, HEURE_FIN: s.timeEnd
                            });
                        });
                    });

                    pool.forEach(s => {
                        rows.push({
                            NOM: s.NOM, PRENOM: s.PRENOM, DIV: s.DIV,
                            TT: isStudentTT(s) ? 'OUI' : 'NON',
                            AESH_NOM: s.AESH_NOM || '', AESH_PRENOM: s.AESH_PRENOM || '',
                            GROUPE: s.GROUPE || '',
                            THEME: s.THEME || '', LANGUE: s.LANGUE || '', PARCOURS: s.PARCOURS || '',
                            JURY: 'NON AFFECTÉ', SALLE: '',
                            HEURE_PASSAGE: '', HEURE_FIN: ''
                        });
                    });

                    rows.sort((a,b) => a.NOM.localeCompare(b.NOM));
                    downloadCSV(rows, `export_eleves_perso_${sessionYear}.csv`);
                }
                else if (type === 'GENERAL_EXCEL') {
                    const activeJuries = Object.values(juries).filter(j => j.prof1Id || j.prof2Id || j.students.length > 0);
                    const times = new Set();
                    const juriesData = [];

                    activeJuries.forEach(jury => {
                        const studentsWithTime = calculateStudentTimes(jury.students, settings.startTime, settings);
                        const studentsMap = {};
                        
                        studentsWithTime.forEach(s => {
                            times.add(s.timeStart);
                            if (!studentsMap[s.timeStart]) studentsMap[s.timeStart] = [];
                            studentsMap[s.timeStart].push(s);
                        });

                        juriesData.push({
                            id: jury.id,
                            room: jury.room,
                            studentsMap
                        });
                    });

                    const sortedTimes = Array.from(times).sort();

                    const aoa = [];
                    // Création de l'en-tête
                    const headers = ['Horaire'];
                    juriesData.forEach(j => headers.push(`JURY ${j.id} (Salle ${j.room})`));
                    aoa.push(headers);

                    // Création des lignes de données
                    sortedTimes.forEach(time => {
                        const row = [time];
                        juriesData.forEach(j => {
                            const studentsArr = j.studentsMap[time];
                            if (!studentsArr || studentsArr.length === 0) {
                                row.push('');
                            } else {
                                const firstS = studentsArr[0];
                                if (firstS.isBreak) {
                                    row.push('PAUSE');
                                } else if (firstS.isJuryChange) {
                                    const p1 = profs.find(p=>p.id===firstS.prof1Id)?.NOM || '?';
                                    const p2 = profs.find(p=>p.id===firstS.prof2Id)?.NOM || '?';
                                    row.push(`RELÈVE (${p1} / ${p2})`);
                                } else {
                                    // Affichage allégé : Uniquement Nom et Prénom, regroupés si plusieurs élèves
                                    const namesText = studentsArr.map(s => `${s.NOM} ${s.PRENOM}`).join('\n');
                                    row.push(namesText);
                                }
                            }
                        });
                        aoa.push(row);
                    });

                    // Création du classeur Excel et téléchargement
                    const ws = XLSX.utils.aoa_to_sheet(aoa);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Planning Général");
                    XLSX.writeFile(wb, `Planning_General_${sessionYear}.xlsx`);
                }
            };

            const initiateSave = () => {
                const defaultName = `ORAL_PERSO_${new Date().toLocaleDateString('fr-FR').replace(/\//g, '-')}`;
                setSaveFileName(defaultName);
                setShowSaveModal(true);
            };

            const performSave = () => {
                const data = {
                    date: new Date().toISOString(),
                    profs, students, pool, juries, settings, schoolName, schoolCity, schoolLogo, schoolStamp, sessionYear, templates
                };
                const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                
                let finalName = saveFileName.trim() || `ORAL_PERSO_${new Date().toLocaleDateString('fr-FR').replace(/\//g, '-')}`;
                if (!finalName.toLowerCase().endsWith('.json')) finalName += '.json';

                link.download = finalName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setShowSaveModal(false);
            };

            const handleLoad = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        setProfs(data.profs || []);
                        
                        if (data.studentsPERSO) setStudents(data.studentsPERSO);
                        else setStudents(data.students || []);

                        if (data.poolPERSO) setPool(data.poolPERSO);
                        else setPool(data.pool || []);

                        if (data.juries && data.juries.PERSO) setJuries(data.juries.PERSO);
