        const normalizeText = (text) => text ? text.toString().toUpperCase().trim() : "";

        // ROBUSTESSE: Fonction universelle pour vérifier si un élève est Tiers-Temps (TT)
        const isStudentTT = (student) => {
            if (!student || student.TT === undefined || student.TT === null) return false;
            if (student.TT === true) return true;
            const norm = student.TT.toString().toUpperCase().trim();
            return norm === 'OUI' || norm === 'O' || norm === 'VRAI' || norm.includes('TIERS') || norm === 'TRUE';
        };

        // ROBUSTESSE: Fonction universelle pour vérifier si un élève utilise un PC
        const isStudentPC = (student) => {
            if (!student || student.PC === undefined || student.PC === null) return false;
            if (student.PC === true) return true;
            const norm = student.PC.toString().toUpperCase().trim();
            return norm === 'OUI' || norm === 'O' || norm === 'VRAI' || norm === 'TRUE';
        };

        const checkCompatibility = (student, profs, examType) => {
            if (!student) return true; 
            if (examType === 'PERSO') return true; 
            
            let requiredSubjects = [];

            if (examType === 'DNB') {
                const parcours = normalizeText(student.PARCOURS);
                const langue = normalizeText(student.LANGUE);
                
                for (const key in SUBJECT_MAPPING) {
                    if (parcours.includes(key)) requiredSubjects = [...requiredSubjects, ...SUBJECT_MAPPING[key]];
                }
                for (const key in SUBJECT_MAPPING) {
                    if (langue.includes(key)) requiredSubjects = [...requiredSubjects, ...SUBJECT_MAPPING[key]];
                }

                if (SUBJECT_MAPPING[parcours]) requiredSubjects = [...requiredSubjects, ...SUBJECT_MAPPING[parcours]];
                if (SUBJECT_MAPPING[langue]) requiredSubjects = [...requiredSubjects, ...SUBJECT_MAPPING[langue]];
            } 
            else if (examType === 'GO') {
                if (!student.EDS) return null;
                const eds = normalizeText(student.EDS);
                
                for (const key in GO_SUBJECT_MAPPING) {
                    if (eds.includes(key) || key.includes(eds)) {
                        requiredSubjects = [...requiredSubjects, ...GO_SUBJECT_MAPPING[key]];
                    }
                }
                requiredSubjects.push(eds);
            }

            requiredSubjects = [...new Set(requiredSubjects)];

            if (requiredSubjects.length === 0) return null; 

            const hasMatch = profs.some(p => {
                if (!p || !p.MATIERE) return false;
                const mat = normalizeText(p.MATIERE);
                return requiredSubjects.some(req => mat.includes(normalizeText(req)));
            });

            return hasMatch;
        };

        const addMinutes = (timeStr, minutesToAdd) => {
            if (!timeStr) return "";
            const [h, m] = timeStr.split(':').map(Number);
            const date = new Date();
            date.setHours(h);
            date.setMinutes(m + minutesToAdd);
            return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        };

        const calculateStudentTimes = (students, startTime, examType, examSettings) => {
            let currentTime = startTime;
            let lastGroup = null;
            let lastGroupStart = null;
            let lastGroupEnd = null;

            return students.map(student => {
                if (student.isBreak) {
                    const duration = student.duration !== undefined ? student.duration : 15;
                    const start = currentTime;
                    const end = addMinutes(start, duration);
                    currentTime = end; 
                    lastGroup = null; lastGroupStart = null; lastGroupEnd = null;
                    return { ...student, timeStart: start, timeEnd: end };
                }

                const rawGroup = ((examType === 'DNB' || examType === 'PERSO') && student.GROUPE) ? student.GROUPE.toString().trim() : "";
                const isGroup = rawGroup.length > 0 && rawGroup.toUpperCase() !== "NON";
                const isTT = isStudentTT(student);

                let start, end;

                if (isGroup && rawGroup === lastGroup) {
                    start = lastGroupStart;
                    end = lastGroupEnd;
                } else {
                    start = currentTime;
                    
                    let duration = student.duration;
                    let synthesisTime = 5; 

                    if (duration === undefined) {
                        if (examType === 'CFG' || examType === 'GO') {
                            duration = 20; 
                            if (isTT) duration += 7;
                        } else if (examType === 'DNB') {
                            duration = isGroup ? 25 : 15;
                            if (isTT) duration += 5;
                        } else if (examType === 'PERSO') {
                            duration = isGroup ? (examSettings?.durationGroup ?? 20) : (examSettings?.durationIndiv ?? 20);
                            if (isTT) duration += (examSettings?.ttBonus ?? 5);
                        }
                    }

                    if (examType === 'PERSO') {
                        synthesisTime = examSettings?.synthesisTime ?? 5;
                    }

                    end = addMinutes(start, duration);
                    currentTime = addMinutes(end, synthesisTime);

                    if (isGroup) {
                        lastGroup = rawGroup;
                        lastGroupStart = start;
                        lastGroupEnd = end;
                    } else {
                        lastGroup = null; lastGroupStart = null; lastGroupEnd = null;
                    }
                }

                return { ...student, timeStart: start, timeEnd: end };
            });
        };

        const timeToMinutes = (t) => {
            if (!t) return 0;
            const [h, m] = t.split(':').map(Number);
            return (h * 60) + (m || 0);
        };

        const minutesToHHMM = (mins) => {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            const hh = String(h).padStart(2,'0');
            const mm = String(m).padStart(2,'0');
            return `${hh}:${mm}`;
        };

        const formatMinutesHM = (mins) => {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return `${h}h${String(m).padStart(2,'0')}`;
        };

        const calculateJuryLoad = (jury, startTime, examType, examSettings) => {
            const studentsWithTime = calculateStudentTimes(jury.students || [], startTime, examType, examSettings);
            
            let totalMinutes = 0;
            let ttCount = 0;
            const groupIds = new Set();
            let lastEnd = startTime;
            
            let realStudentCount = 0;
            const uniqueSlots = new Set();

            studentsWithTime.forEach(s => {
                if (s.isBreak) return;
                
                realStudentCount++;
                
                const slotKey = s.timeStart + '-' + s.timeEnd;
                
                if (!uniqueSlots.has(slotKey)) {
                    uniqueSlots.add(slotKey);
                    totalMinutes += Math.max(0, timeToMinutes(s.timeEnd) - timeToMinutes(s.timeStart));
                }
                
                if (!lastEnd || timeToMinutes(s.timeEnd) > timeToMinutes(lastEnd)) {
                    lastEnd = s.timeEnd;
                }

                const isTT = isStudentTT(s);
                if (isTT) ttCount++;
                const g = (s.GROUPE && s.GROUPE.toString().trim() && normalizeText(s.GROUPE) !== 'NON') ? s.GROUPE.toString().trim() : '';
                if (g) groupIds.add(g);
            });

            return {
                juryId: jury.id,
                room: jury.room || '',
                studentCount: realStudentCount,
                passageCount: uniqueSlots.size, 
                totalMinutes,
                ttCount,
                groupCount: groupIds.size,
                endTime: lastEnd || startTime
            };
        };

        const getLoadStatus = (juryMinutes, avgMinutes) => {
            if (!avgMinutes || avgMinutes <= 0) return { label: '—', cls: 'text-slate-600 bg-slate-100 border-slate-200' };
            const ratio = juryMinutes / avgMinutes;
            if (ratio <= 1.10) return { label: 'Équilibré', cls: 'text-emerald-700 bg-emerald-50 border-emerald-200' };
            if (ratio <= 1.20) return { label: 'Sous tension', cls: 'text-orange-700 bg-orange-50 border-orange-200' };
            return { label: 'Surchargé', cls: 'text-red-700 bg-red-50 border-red-200' };
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return "Date non définie";
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                const date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                return date.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            }
            const date = new Date(dateStr);
            return date.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        };

        const downloadCSV = (data, filename) => {
            if (!data || data.length === 0) {
                return;
            }
            const headers = Object.keys(data[0]).join(";");
            const rows = data.map(row => 
                Object.values(row).map(value => {
                    const str = String(value || '');
                    return `"${str.replace(/"/g, '""')}"`;
                }).join(";")
            );
            const csvContent = "\uFEFF" + [headers, ...rows].join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };

        const chunkArray = (array, size) => {
            const chunks = [];
            for (let i = 0; i < array.length; i += size) {
                chunks.push(array.slice(i, i + size));
            }
            return chunks;
        };

        /* --- COMPONENTS --- */

        const FileUploader = ({ label, onDataLoaded, fields, color = "blue" }) => {
             const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    transformHeader: (h) => h.trim(),
                    complete: (results) => {
                        onDataLoaded(results.data);
                    }
                });
            };

            const colorClasses = {
                blue: "border-blue-200 bg-blue-50/50 hover:bg-blue-100/80 text-blue-700",
                green: "border-emerald-200 bg-emerald-50/50 hover:bg-emerald-100/80 text-emerald-700",
                rose: "border-rose-200 bg-rose-50/50 hover:bg-rose-100/80 text-rose-700",
                indigo: "border-indigo-200 bg-indigo-50/50 hover:bg-indigo-100/80 text-indigo-700",
                amber: "border-amber-200 bg-amber-50/50 hover:bg-amber-100/80 text-amber-700"
            };

            return (
                <div className={`relative group overflow-hidden border-2 border-dashed rounded-xl transition-all duration-300 cursor-pointer ${colorClasses[color] || colorClasses.blue}`}>
                    <label className="flex flex-col items-center justify-center p-4 h-full w-full cursor-pointer gap-2">
                        <div className="bg-white p-2.5 rounded-full shadow-sm group-hover:scale-110 group-hover:shadow-md transition-all duration-300">
                            <FileUp size={20} className={`text-${color}-500`} />
                        </div>
                        <span className="font-bold text-sm text-center">{label}</span>
                        <span className="text-[10px] opacity-60 font-medium">CSV : {fields.slice(0, 2).join(', ')}...</span>
                        <input type="file" accept=".csv" onChange={handleFile} className="hidden" />
                    </label>
                </div>
            );
        };

        const StudentCard = ({ student, type, draggable, onDragStart, onUpdateDuration, onEditEds, onGeneralEdit, isCompat, examSettings, onDelete }) => {
            if (student.isBreak) {
                const bgClass = "bg-orange-50 border-orange-200";
                const textClass = "text-orange-700";
                const pillClass = "text-orange-800 bg-orange-100 border-orange-200";
                const btnClass = "text-orange-400 hover:text-red-600 hover:bg-orange-100";
                const controlsClass = "text-orange-600 border-orange-200";
                const btnCtrlClass = "text-orange-400 hover:text-orange-600 hover:bg-orange-50";

                return (
                    <div 
                        draggable={draggable}
                        onDragStart={(e) => onDragStart(e, student)}
                        className={`p-2 mb-2 rounded border shadow-sm cursor-grab active:cursor-grabbing text-sm flex flex-col gap-1 relative group ${bgClass}`}
                    >
                        <div className="flex items-center justify-between">
                            <div className={`flex items-center gap-2 font-bold ${textClass}`}>
                                <Coffee size={18} />
                                <span>{student.NOM || 'PAUSE'}</span>
                            </div>
                            <div className="flex items-center gap-2">
                                {student.timeStart && student.timeEnd && (
                                    <div className={`text-xs font-mono font-bold px-2 py-0.5 rounded border ${pillClass}`}>
                                        {student.timeStart} - {student.timeEnd}
                                    </div>
                                )}
                                {onDelete && (
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); onDelete(student.id); }}
                                        className={`p-1 rounded transition-colors ${btnClass}`}
                                        title="Supprimer cette pause"
                                    >
                                        <Trash2 size={14} />
                                    </button>
                                )}
                            </div>
                        </div>
                        
                        <div className="flex items-center justify-between mt-1 pl-1">
                             <span className={`text-[10px] font-medium uppercase tracking-wide opacity-80 ${textClass}`}>Durée personnalisable</span>
                             <div className={`flex items-center gap-1 bg-white rounded border px-1 shadow-sm ${controlsClass}`}>
                                {onUpdateDuration && (
                                    <button onClick={(e) => { e.stopPropagation(); onUpdateDuration(student.id, Math.max(5, (student.duration || 15) - 5)); }} className={`p-1 rounded ${btnCtrlClass}`} title="- 5 min"><Minus size={12} /></button>
                                )}
                                <span className={`text-xs font-mono font-bold w-12 text-center ${textClass}`}>{student.duration || 15} min</span>
                                {onUpdateDuration && (
                                    <button onClick={(e) => { e.stopPropagation(); onUpdateDuration(student.id, (student.duration || 15) + 5); }} className={`p-1 rounded ${btnCtrlClass}`} title="+ 5 min"><Plus size={12} /></button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            const isTT = isStudentTT(student);
            const isPC = isStudentPC(student);
            const isAESH = student.AESH_NOM && student.AESH_NOM.trim() !== "";
            const isGroup = student.GROUPE && student.GROUPE.toString().trim().length > 0 && student.GROUPE.toString().toUpperCase() !== 'NON';
            const showCompat = (type === 'DNB' || type === 'GO') && !student.isBreak && isCompat !== undefined;
            
            let defaultDuration = 15;
            if (type === 'CFG' || type === 'GO') {
                defaultDuration = 20 + (isTT ? 7 : 0);
            } else if (type === 'DNB') {
                defaultDuration = (isGroup ? 25 : 15) + (isTT ? 5 : 0);
            } else if (type === 'PERSO') {
                defaultDuration = (isGroup ? (examSettings?.durationGroup ?? 20) : (examSettings?.durationIndiv ?? 20)) + (isTT ? (examSettings?.ttBonus ?? 5) : 0);
            }
            const currentDuration = student.duration !== undefined ? student.duration : defaultDuration;

            return (
                <div 
                    draggable={draggable}
                    onDragStart={(e) => onDragStart(e, student)}
                    className={`
                        p-2 mb-2 rounded shadow-sm cursor-grab active:cursor-grabbing text-sm flex flex-col gap-1 relative group
                        ${isTT ? 'bg-red-50 border border-red-200' : (isGroup ? 'bg-blue-50/40 border border-blue-200 border-l-4 border-l-blue-500' : 'bg-white border border-gray-200')}
                        ${draggable ? 'hover:shadow-md' : ''}
                    `}
                >
                    <div className="flex justify-between items-start font-bold">
                        <div className="flex items-center gap-2 flex-wrap">
                            <span className={isTT ? 'text-red-700' : (isGroup ? 'text-blue-900' : 'text-gray-800')}>
                                {student.NOM} {student.PRENOM}
                            </span>
                            {isGroup && (
                                <span className="bg-blue-500 text-white text-[10px] px-1.5 py-0.5 rounded flex items-center gap-1 shadow-sm font-black tracking-wide" title={`Fait partie du groupe ${student.GROUPE}`}>
                                    <Users size={10} /> {student.GROUPE}
                                </span>
                            )}
                        </div>
                    </div>
                    <div className="mb-1 flex gap-2 flex-wrap">
                        <span className="text-xs bg-gray-200 px-1 rounded">{student.DIV}</span>
                        {isAESH && <span className="text-xs bg-purple-100 text-purple-700 px-1 rounded font-bold flex items-center gap-1" title={`${student.AESH_NOM} ${student.AESH_PRENOM || ''}`}><HandHeart size={10} /> AESH</span>}
                        {isPC && <span className="text-xs bg-blue-100 text-blue-700 px-1 rounded font-bold flex items-center gap-1" title="Utilise un Ordinateur"><Laptop size={10} /> PC</span>}
                    </div>
                    
                    {isTT && <span className="text-xs font-bold text-red-600">⚠️ TIERS TEMPS</span>}
                    
                    {type === 'DNB' && (
                        <div className="text-xs text-gray-600 pb-2">
                            {student.PARCOURS && <div className="truncate" title={student.PARCOURS}>Parcours: {student.PARCOURS}</div>}
                            {student.THEME && <div className="truncate" title={student.THEME}>Thème: {student.THEME}</div>}
                            {student.LANGUE && <div>Langue: {student.LANGUE}</div>}
                        </div>
                    )}

                    {type === 'PERSO' && (
                        <div className="text-xs text-gray-600 pb-2">
                            {student.THEME && <div className="truncate font-medium text-amber-700" title={student.THEME}>Thème: {student.THEME}</div>}
                        </div>
                    )}

                    {type === 'GO' && (
                        <div className="text-xs mt-1 border-t border-gray-100 pt-1 pb-1">
                            {student.EDS ? (
                                <div className="text-rose-700 font-bold flex items-center gap-1 pr-6">
                                    <BookOpen size={12} /> {student.EDS}
                                    {onEditEds && (
                                        <button onClick={(e) => { e.stopPropagation(); onEditEds(student); }} className="text-gray-400 hover:text-rose-600 ml-1">
                                            <Edit size={12} />
                                        </button>
                                    )}
                                </div>
                            ) : (
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onEditEds && onEditEds(student); }}
                                    className="w-full text-center bg-rose-50 hover:bg-rose-100 text-rose-600 text-xs font-bold py-1 rounded border border-rose-200 flex items-center justify-center gap-1"
                                >
                                    <Edit size={12} /> Définir EDS
                                </button>
                            )}
                        </div>
                    )}

                    {showCompat && (
                        <>
                            {isCompat === true && (
                                <div className="absolute bottom-8 right-1 bg-green-50 text-green-700 border border-green-200 text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm flex items-center gap-1 z-10 backdrop-blur-sm">
                                    <CheckCircle size={12} /> Compatible
                                </div>
                            )}
                            {isCompat === false && (
                                <div className="absolute bottom-8 right-1 bg-orange-50 text-orange-700 border border-orange-200 text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm flex items-center gap-1 z-10 backdrop-blur-sm">
                                    <AlertTriangle size={12} /> Matière ?
                                </div>
                            )}
                            {isCompat === null && type === 'GO' && (
                                <div className="absolute bottom-8 right-1 bg-orange-50 text-orange-700 border border-orange-200 text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm flex items-center gap-1 z-10 backdrop-blur-sm">
                                    <AlertTriangle size={12} /> EDS ?
                                </div>
                            )}
                        </>
                    )}

                    {!student.isBreak && (
                        <div className="flex items-center justify-between mt-1 pt-1 border-t border-gray-100/50 relative z-20">
                             <div className="flex items-center gap-2">
                                 <span className="text-[10px] text-gray-500 font-medium uppercase flex items-center gap-1">
                                    <Clock size={10}/> Durée :
                                 </span>
                                 <div className="flex items-center gap-1 bg-gray-50 rounded border border-gray-200 px-1">
                                     {onUpdateDuration && (
                                         <button onClick={(e) => { e.stopPropagation(); onUpdateDuration(student.id, Math.max(5, currentDuration - 5)); }} className="p-0.5 text-gray-400 hover:text-blue-600 rounded" title="- 5 min"><Minus size={10} /></button>
                                     )}
                                     <span className="text-[10px] font-mono font-bold w-6 text-center text-gray-700">{currentDuration}m</span>
                                     {onUpdateDuration && (
                                         <button onClick={(e) => { e.stopPropagation(); onUpdateDuration(student.id, currentDuration + 5); }} className="p-0.5 text-gray-400 hover:text-blue-600 rounded" title="+ 5 min"><Plus size={10} /></button>
                                     )}
                                 </div>
                             </div>
                             <button 
                                 onClick={(e) => { e.stopPropagation(); onGeneralEdit(student); }}
                                 className="text-gray-500 hover:text-blue-600 bg-white hover:bg-gray-100 rounded p-1 transition-colors shadow-sm border border-gray-200 ml-2"
                                 title="Modifier les informations"
                             >
                                 <Edit size={12} />
                             </button>
                        </div>
                    )}
                </div>
            );
        };

        const JuryColumn = ({ juryId, juryData, profs, onUpdateJury, onDropStudent, onRemoveStudent, onMoveStudent, onUpdateStudentDuration, examType, startTime, examSettings, onEditEds, onGeneralEdit, onAddPause }) => {
            const [isEditing, setIsEditing] = useState(false);
            const studentsWithTime = calculateStudentTimes(juryData.students, startTime, examType, examSettings);
            const prof1 = profs.find(p => p.id === juryData.prof1Id) || {};
            const prof2 = profs.find(p => p.id === juryData.prof2Id) || {};

            const handleDrop = (e) => {
                e.preventDefault();
                const data = e.dataTransfer.getData("student");
                if (data === "NEW_PAUSE") {
                    onDropStudent(juryId, { id: 'NEW_PAUSE' });
                } else {
                    const studentData = JSON.parse(data);
                    onDropStudent(juryId, studentData);
                }
            };

            return (
                <div 
                    className="bg-white border border-gray-300 rounded-lg flex flex-col w-80 shrink-0 h-full max-h-[800px]"
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={handleDrop}
                >
                    <div className="bg-slate-100 p-3 rounded-t-lg border-b border-gray-200">
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="font-bold text-lg text-slate-800">Jury {juryId}</h3>
                            <button onClick={() => setIsEditing(!isEditing)} className="text-blue-600 hover:text-blue-800">
                                <Edit size={16} />
                            </button>
                        </div>
                        
                        {isEditing ? (
                            <div className="flex flex-col gap-2 text-sm mb-2">
                                <input type="text" value={juryData.room} onChange={(e) => onUpdateJury(juryId, 'room', e.target.value)} className="border p-1 rounded" placeholder="Salle (ex: D21)"/>
                                <select className="border p-1 rounded" value={juryData.prof1Id || ''} onChange={(e) => onUpdateJury(juryId, 'prof1Id', e.target.value)}>
                                    <option value="">Sélectionner Prof 1</option>
                                    {profs.map(p => <option key={p.id} value={p.id}>{p.NOM} {p.PRENOM} ({p.MATIERE})</option>)}
                                </select>
                                <select className="border p-1 rounded" value={juryData.prof2Id || ''} onChange={(e) => onUpdateJury(juryId, 'prof2Id', e.target.value)}>
                                    <option value="">Sélectionner Prof 2</option>
                                    {profs.map(p => <option key={p.id} value={p.id}>{p.NOM} {p.PRENOM} ({p.MATIERE})</option>)}
                                </select>
                            </div>
                        ) : (
                            <div className="text-sm">
                                <p className="font-semibold">Salle : <span className="text-blue-600">{juryData.room || 'Non assignée'}</span></p>
                                <p className="truncate" title={prof1.NOM ? `${prof1.NOM} ${prof1.PRENOM}` : ''}>P1: {prof1.NOM || '---'} <span className="text-gray-500 text-xs">({prof1.MATIERE || '?'})</span></p>
                                <p className="truncate" title={prof2.NOM ? `${prof2.NOM} ${prof2.PRENOM}` : ''}>P2: {prof2.NOM || '---'} <span className="text-gray-500 text-xs">({prof2.MATIERE || '?'})</span></p>
                            </div>
                        )}
                        
                        {/* Boutons d'ajouts rapides par Jury */}
                        <div className="flex mt-3 pt-3 border-t border-gray-200/60">
                            <button onClick={() => onAddPause(juryId, 'PAUSE', 15)} className="w-full bg-orange-50 text-orange-600 border border-orange-200 py-1.5 rounded-lg text-xs font-bold flex items-center justify-center gap-1.5 hover:bg-orange-100 transition-colors shadow-sm"><Coffee size={14}/> Pause</button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-2 space-y-2 bg-gray-50">
                        {studentsWithTime.length === 0 && <div className="text-center text-gray-400 italic py-10">Glisser les élèves ici</div>}
                        {studentsWithTime.map((student, idx) => {
                            const isCompat = (examType === 'DNB' || examType === 'GO') ? checkCompatibility(student, [prof1, prof2], examType) : undefined;
                            const isLinkedToPrev = !student.isBreak && idx > 0 && student.timeStart === studentsWithTime[idx-1].timeStart;

                            return (
                                <div key={student.id} className="relative group">
                                    <div className={`absolute -left-2 top-2 text-[10px] font-mono w-10 text-right pr-1 ${isLinkedToPrev ? 'text-blue-300' : 'text-gray-500'}`}>
                                        {isLinkedToPrev ? '↳' : student.timeStart}
                                    </div>
                                    <div className="ml-8">
                                        <StudentCard 
                                            student={student} 
                                            type={examType} 
                                            draggable={true}
                                            isCompat={isCompat}
                                            examSettings={examSettings}
                                            onDragStart={(e) => { e.dataTransfer.setData("student", JSON.stringify({...student, fromJury: juryId})); }}
                                            onUpdateDuration={onUpdateStudentDuration ? (id, duration) => onUpdateStudentDuration(juryId, id, duration) : null}
                                            onEditEds={onEditEds}
                                            onGeneralEdit={onGeneralEdit}
                                        />
                                        
                                        <div className="absolute top-1 right-1 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white/80 rounded-lg p-0.5 shadow-sm backdrop-blur-sm">
                                            {idx > 0 && <button onClick={() => onMoveStudent(juryId, student.id, -1)} className="text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded p-0.5"><ChevronUp size={14} /></button>}
                                            {idx < studentsWithTime.length - 1 && <button onClick={() => onMoveStudent(juryId, student.id, 1)} className="text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded p-0.5"><ChevronDown size={14} /></button>}
                                            <div className="w-px bg-gray-200 mx-0.5"></div>

            const startTime = settings?.startTime || '08:00';
            const examDate = settings?.date ? formatDate(settings.date) : "Date non définie";

            const customTitle = settings?.examName || "";
            const defaultLabel = examType === 'GO' ? 'GRAND ORAL BLANC' : examType === 'PERSO' ? 'ORAL PERSONNALISÉ' : `${examType} BLANC`;
            const examLabel = customTitle.trim() ? customTitle : defaultLabel;
            
            const examFullName = customTitle.trim() ? customTitle : (examType === 'DNB' ? 'Diplôme National du Brevet Blanc' : examType === 'GO' ? 'Grand Oral du Baccalauréat Blanc' : examType === 'PERSO' ? 'Épreuve Orale' : 'Certificat de Formation Générale Blanc');

            const renderTemplateText = (text, data) => {
                if (!text) return null;
                let content = text;
                Object.keys(data).forEach(key => {
                    const regex = new RegExp(`{${key}}`, 'g');
                    content = content.replace(regex, data[key] || '');
                });
                
                const parts = content.split(/(\*\*.*?\*\*)/g);
                return (
                    <div className="whitespace-pre-line">

                    const timedStudents = calculateStudentTimes(jury.students, startTime, type, settings);

                        if (!s.isBreak) {

                                juryId: jury.id,
                                room: jury.room,
                                time: s.timeStart, 
                                prof1: prof1 ? `${prof1.NOM} ${prof1.PRENOM}` : 'Non assigné',
                                prof2: prof2 ? `${prof2.NOM} ${prof2.PRENOM}` : 'Non assigné'
                            });
                        }
                    });
                });
                return all.sort((a,b) => a.NOM.localeCompare(b.NOM));
            };

                const assignments = [];
                const currentJuries = juries[examType] || {};

                        const p = profs.find(x => x.id === jury.prof1Id);

                    if (jury.prof2Id) {

            };

                    const timedStudents = calculateStudentTimes(jury.students, startTime, examType, settings);
                    timedStudents.forEach(s => {

                            processedStudentNames.add(nameKey);

                            const aeshPrenom = (s.AESH_PRENOM || '').trim().toUpperCase();
                            const key = `${aeshNom} ${aeshPrenom}`.trim();

                    _isGroup: (s.GROUPE && s.GROUPE.length > 0)

                return [...processed].sort((a,b) => {
                    if (type === 'DNB' || type === 'PERSO') {
                        const gA = (a.GROUPE || '').toString().trim();
                        const gB = (b.GROUPE || '').toString().trim();
                        const isGA = gA && gA.toUpperCase() !== 'NON';
                        const isGB = gB && gB.toUpperCase() !== 'NON';
                        
                        if (isGA && !isGB) return -1;
                        if (!isGA && isGB) return 1;
                        
                        if (isGA && isGB) {
                            const cmp = gA.localeCompare(gB);
                            if (cmp !== 0) return cmp;
                        }
                    }
                    return a.NOM.localeCompare(b.NOM);
                });
            };

                const existingMap = new Map();
                profs.forEach(p => existingMap.set(`${normalizeText(p.NOM)}|${normalizeText(p.PRENOM)}`, p));
                
                let newCount = 0;
                let updatedCount = 0;
                const newProfs = [];
                
                data.forEach((imported, i) => {

                    if (existingMap.has(key)) {
                        const existing = existingMap.get(key);

                        updatedCount++;
                    } else {
                        newProfs.push({ ...imported, id: `PROF-${Date.now()}-${i}-${Math.random().toString(36).substr(2, 5)}` });
                        newCount++;
                    }
                });
                
                alert(`Import Professeurs : ${newCount} ajout(s), ${updatedCount} mise(s) à jour.`);

                else { prevGlobalList = studentsPERSO; setGlobalList = setStudentsPERSO; prevPool = poolPERSO; setPool = setPoolPERSO; }

                const getUniqueKey = (s) => `${normalizeText(s.NOM)}|${normalizeText(s.PRENOM)}`;
                const existingMap = new Map();
                prevGlobalList.forEach(s => existingMap.set(getUniqueKey(s), s));
                
                const newStudents = [];
                const updatedIds = new Set();
                let newCount = 0;
                let updatedCount = 0;
                
                data.forEach((imported, i) => {
                    const key = getUniqueKey(imported);
                    const processedImport = {
                        ...imported,
                        _isTT: isStudentTT(imported),
                        _isGroup: (imported.GROUPE && imported.GROUPE.length > 0)
                    };

                        const existing = existingMap.get(key);

                        existingMap.set(key, updated);
                        updatedIds.add(existing.id);

                        };

                        newCount++;

                        const isGB = gB && gB.toUpperCase() !== 'NON';
                        if (isGA && !isGB) return -1;
                        if (!isGA && isGB) return 1;
                        if (isGA && isGB) {
                            const cmp = gA.localeCompare(gB);
                            if (cmp !== 0) return cmp;
                        }
                    }
                    return a.NOM.localeCompare(b.NOM);
                };
                
                finalGlobalList.sort(sortFn);
                setGlobalList(finalGlobalList);
                
                const newPool = prevPool

            const handleAutoDistribution = () => {
                const type = activeTab;

                const activeJuryIds = Object.keys(currentJuries);

                if (pool.length === 0) { alert("Aucun élève dans la liste d'attente."); return; }
                if (activeJuryIds.length === 0) { alert("Aucun jury configuré."); return; }
                if (!confirm(`Répartir ${pool.length} élèves sur ${activeJuryIds.length} jurys ?`)) return;

                const newJuriesState = JSON.parse(JSON.stringify(currentJuries));
                
                let unitsToAssign = [];

                if (type === 'DNB' || type === 'PERSO') {
                    const groupsMap = {};
                    const singles = [];

                    pool.forEach(s => {
                        const gRaw = (s.GROUPE || '').toString().trim();
                        const gName = gRaw.toUpperCase();
                        if (gName && gName !== 'NON') {
                            if (!groupsMap[gName]) groupsMap[gName] = [];
                            groupsMap[gName].push(s);
                        } else {
                            singles.push(s);
                        }
                    });

                    Object.keys(groupsMap).sort().forEach(gName => {
                        unitsToAssign.push({ students: groupsMap[gName], isGroup: true, id: `GRP-${gName}` });
                    });
                    singles.forEach(s => {
                        unitsToAssign.push({ students: [s], isGroup: false, id: s.id });
                    });

                } else {
                    unitsToAssign = pool.map(s => ({ students: [s], isGroup: false, id: s.id }));
                }

                unitsToAssign.sort((a, b) => {
                    const hasTT_A = a.students.some(s => isStudentTT(s));
                    const hasTT_B = b.students.some(s => isStudentTT(s));
                    
                    if (hasTT_A === hasTT_B) {
                        return a.students[0].NOM.localeCompare(b.students[0].NOM);
                    }
                    return hasTT_A ? 1 : -1; 
                });

                unitsToAssign.forEach(unit => {
                    let bestJuryId = null;
                    let minScore = Infinity;

                    activeJuryIds.forEach(juryId => {
                        const jury = newJuriesState[juryId];
                        const prof1 = profs.find(p => p.id === jury.prof1Id);
                        const prof2 = profs.find(p => p.id === jury.prof2Id);
                        
                        let score = (jury.students.length + unit.students.length) * 10;

                        if ((type === 'DNB' || type === 'GO') && (prof1 || prof2)) {
                            unit.students.forEach(student => {

                                } else if (compat === false) {
                                    score += 100; 
                                }
                            });
                        }

                        if (score < minScore) {
                            minScore = score;
                            bestJuryId = juryId;
                        }
                    });

                    if (bestJuryId) {
                        unit.students.forEach(student => {
                            newJuriesState[bestJuryId].students.push(student);
                        });

                                                <Users size={16} className="text-amber-500" />
                                                <span className="text-xs text-amber-700 font-bold uppercase">Groupe (min)</span>
                                                <input type="number" min="5" value={settings.PERSO.durationGroup ?? 25} onChange={(e) => setSettings({...settings, PERSO: {...settings.PERSO, durationGroup: parseInt(e.target.value) || 0}})} className="bg-white outline-none font-black text-amber-900 w-14 text-sm text-center border border-amber-300 rounded focus:border-amber-500 focus:ring-2 focus:ring-amber-100 py-0.5" />
                                            </div>
                                            <div className="flex items-center gap-2 bg-white px-4 py-2.5 rounded-xl border border-amber-200" title="Temps de Bilan/Délibération du jury entre 2 passages">
                                                <Coffee size={16} className="text-amber-500" />
                                                <span className="text-xs text-amber-700 font-bold uppercase">Bilan (min)</span>
                                                <input type="number" min="0" value={settings.PERSO.synthesisTime ?? 5} onChange={(e) => setSettings({...settings, PERSO: {...settings.PERSO, synthesisTime: parseInt(e.target.value) || 0}})} className="bg-white outline-none font-black text-amber-900 w-14 text-sm text-center border border-amber-300 rounded focus:border-amber-500 focus:ring-2 focus:ring-amber-100 py-0.5" />
                                            </div>
                                            <div className="flex items-center gap-2 bg-red-50 px-4 py-2.5 rounded-xl border border-red-100" title="Majoration Tiers-Temps">
                                                <Plus size={16} className="text-red-500" />
                                                <span className="text-xs text-red-600 font-bold uppercase">Majoration TT (min)</span>
                                                <input type="number" min="0" value={settings.PERSO.ttBonus ?? 5} onChange={(e) => setSettings({...settings, PERSO: {...settings.PERSO, ttBonus: parseInt(e.target.value) || 0}})} className="bg-white outline-none font-black text-red-700 w-14 text-sm text-center border border-red-300 rounded focus:border-red-500 focus:ring-2 focus:ring-red-100 py-0.5" />
                                            </div>
                                            
                                            {/* BOUTON ACTUALISER POUR TOUS */}
                                            <div className="flex-1 flex justify-end">
                                                <button onClick={handleRefreshPersoTimes} className="bg-amber-600 hover:bg-amber-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-md shadow-amber-900/10 transition-all border border-amber-800/20">
                                                    <RotateCcw size={16} /> Actualiser les horaires
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'DNB' && (
                                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-xl shadow-sm flex items-center gap-4 mt-2">
                                        <div className="bg-white p-2 rounded-full text-blue-600"><BookOpen size={24} /></div>
                                        <div>
                                            <h3 className="text-xs font-bold text-blue-400 uppercase tracking-widest mb-0.5">Mode d'emploi DNB</h3>
                                            <p className="text-blue-900 text-sm">
                                                <strong>Individuel :</strong> 15 min (5' exposé + 10' entretien). <strong>Collectif :</strong> 25 min (10' + 15').<br/>
                                                <span className="opacity-80">Placez d'abord les membres des jurys. Glissez ensuite les élèves vers les jurys. Une pastille <span className="text-green-600 font-bold">Verte</span> indique une compatibilité matière/parcours.</span>
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'CFG' && (
                                    <div className="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-xl shadow-sm flex items-center gap-4 mt-2">
                                        <div className="bg-white p-2 rounded-full text-emerald-600"><Award size={24} /></div>
                                        <div>
                                            <h3 className="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-0.5">Mode d'emploi CFG</h3>
                                            <p className="text-emerald-900 text-sm">
                                                <strong>Oral :</strong> 20 minutes (Entretien dossier). <strong>Strictement individuel.</strong><br/>
                                                <span className="opacity-80">Placez d'abord les membres des jurys. L'épreuve ne comporte pas de groupes. Les tiers-temps bénéficient d'une majoration automatique du temps de passage.</span>
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'GO' && (
                                    <div className="bg-rose-50 border-l-4 border-rose-500 p-4 rounded-r-xl shadow-sm flex items-center gap-4 mt-2">
                                        <div className="bg-white p-2 rounded-full text-rose-600"><Mic size={24} /></div>
                                        <div>
                                            <h3 className="text-xs font-bold text-rose-400 uppercase tracking-widest mb-0.5">Mode d'emploi Grand Oral</h3>
                                            <p className="text-rose-900 text-sm">
                                                <strong>Durée :</strong> 20 minutes + 20 minutes de préparation.<br/>
                                                <span className="opacity-80">Vérifiez les EDS de chaque élève. Le logiciel tentera de faire correspondre la matière de l'examinateur avec l'EDS de l'élève. Le temps de préparation (H-20) est inclus sur la convocation.</span>
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'PERSO' && (
                                    <div className="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-xl shadow-sm flex items-center gap-4 mt-2">
                                        <div className="bg-white p-2 rounded-full text-amber-600"><Star size={24} /></div>
                                        <div>
                                            <h3 className="text-xs font-bold text-amber-400 uppercase tracking-widest mb-0.5">Mode d'emploi Oral Personnalisé</h3>
                                            <p className="text-amber-900 text-sm">
                                                <strong>Flexibilité Totale :</strong> Idéal pour les chefs d'œuvre, oraux de stage, oraux blancs divers.<br/>
                                                <span className="opacity-80">Réglez les temps de passage dans le panneau ci-dessus. Vous pouvez mélanger des passages individuels et collectifs. Le temps de bilan entre deux candidats est paramétrable.</span>
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {/* ESPACE DE TRAVAIL : POOL vs JURYS */}
                                <div className="flex-1 flex gap-6 overflow-hidden h-[800px] mt-4">
                                    {/* Liste d'attente (Pool) */}
                                    <div className="w-80 flex flex-col bg-white border border-gray-300 rounded-lg shrink-0 h-full">
                                        <div className="bg-slate-100 p-3 rounded-t-lg border-b border-gray-200">
                                            <h3 className="font-bold text-lg text-slate-800">En attente ({activeTab === 'DNB' ? poolDNB.length : activeTab === 'CFG' ? poolCFG.length : activeTab === 'GO' ? poolGO.length : poolPERSO.length})</h3>
                                            <div className="relative mt-2">
                                                <input type="text" placeholder="Rechercher un élève..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full border p-2 pl-8 rounded text-sm outline-none focus:ring-2 focus:ring-blue-300"/>
                                                <Search size={14} className="absolute left-2.5 top-2.5 text-gray-400" />
                                            </div>
                                        </div>
                                        <div 
                                            className="flex-1 overflow-y-auto p-2 bg-gray-50 custom-scrollbar space-y-2"
                                            onDragOver={(e) => e.preventDefault()}
                                            onDrop={(e) => {
                                                e.preventDefault();
                                                const data = e.dataTransfer.getData("student");
                                                if (data && data !== "NEW_PAUSE") {
                                                    const student = JSON.parse(data);
                                                    if (student.fromJury) removeStudentFromJury(student.fromJury, student.id, true);
                                                }
                                            }}
                                        >
                                            {(activeTab === 'DNB' ? poolDNB : activeTab === 'CFG' ? poolCFG : activeTab === 'GO' ? poolGO : poolPERSO)
                                                .filter(s => s.NOM.toLowerCase().includes(searchTerm.toLowerCase()) || s.PRENOM.toLowerCase().includes(searchTerm.toLowerCase()) || (s.DIV && s.DIV.toLowerCase().includes(searchTerm.toLowerCase())))
                                                .map(student => (
                                                    <StudentCard 
                                                        key={student.id} 
                                                        student={student} 
                                                        type={activeTab} 
                                                        draggable={true}
                                                        examSettings={settings[activeTab]}
                                                        onDragStart={(e) => e.dataTransfer.setData("student", JSON.stringify(student))}
                                                        onEditEds={openEdsModal}
                                                        onGeneralEdit={openGeneralEditModal}
                                                        onDelete={() => handleDeleteFromPool(student.id)}
                                                    />
                                                ))}
                                            {(activeTab === 'DNB' ? poolDNB : activeTab === 'CFG' ? poolCFG : activeTab === 'GO' ? poolGO : poolPERSO).length === 0 && (
                                                <div className="text-center text-gray-400 italic py-10 text-sm">
                                                    Aucun élève en attente.<br/>
                                                    Veuillez importer un fichier CSV.
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Colonnes des Jurys */}
                                    <div className="flex-1 flex flex-col overflow-hidden relative">
                                        {/* Barre de défilement horizontale en haut (Ascenseur) */}
                                        <div ref={topScrollRef} className="overflow-x-auto custom-scrollbar no-print shrink-0 mb-3 bg-white border border-slate-200 rounded-full shadow-sm h-4" onScroll={(e) => {
                                            if (bottomScrollRef.current) bottomScrollRef.current.scrollLeft = e.target.scrollLeft;
                                        }}>
                                            <div style={{height: '1px'}}></div>
                                        </div>

                                        {/* Conteneur principal des jurys avec barre de défilement visible */}
                                        <div ref={bottomScrollRef} className="flex gap-4 overflow-x-auto pb-4 custom-scrollbar flex-1" onScroll={(e) => {
                                            if (topScrollRef.current) topScrollRef.current.scrollLeft = e.target.scrollLeft;
                                        }}>
                                            {Object.keys(juries[activeTab] || {}).map(juryId => (
                                                <JuryColumn 
                                                    key={`${activeTab}-${juryId}`} 
                                                    juryId={juryId} 
                                                    juryData={juries[activeTab][juryId]} 
                                                    profs={profs} 
                                                    examType={activeTab}
                                                    startTime={settings[activeTab].startTime}
                                                    examSettings={settings[activeTab]}
                                                    onUpdateJury={updateJury} 
                                                    onDropStudent={handleDropStudentToJury}
                                                    onRemoveStudent={removeStudentFromJury}
                                                    onMoveStudent={moveStudent}
                                                    onUpdateStudentDuration={handleUpdateStudentInJury}
                                                    onEditEds={openEdsModal}
                                                    onGeneralEdit={openGeneralEditModal}
                                                    onAddPause={handleAddPauseToJury}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                    </main>

                    {/* Modales */}
                    {showPrint && (
                        <PrintView 
                            juries={juries} 
                            profs={profs} 
                            examType={activeTab === 'PILOTAGE' ? 'DNB' : activeTab}
                            settings={settings[activeTab === 'PILOTAGE' ? 'DNB' : activeTab]} 
                            onClose={() => setShowPrint(false)} 
                            schoolName={schoolName}
                            schoolCity={schoolCity}
                            schoolLogo={schoolLogo}
                            schoolStamp={schoolStamp}
                            sessionYear={sessionYear}
                            templates={templates}
                            setTemplates={setTemplates}
                        />
                    )}

                    {showEdsModal && currentStudentForEds && (
                        <StudentEditModal 
                            student={currentStudentForEds} 
                            onClose={() => setShowEdsModal(false)}
                            onSave={saveEds}
                        />
                    )}

                    {showGeneralEditModal && currentStudentForGeneralEdit && (
                        <GeneralStudentEditModal 
                            student={currentStudentForGeneralEdit}
                            examType={activeTab}
                            onClose={() => setShowGeneralEditModal(false)}
                            onSave={saveGeneralStudent}
                        />
                    )}

                    {showProfManager && (
                        <ProfManagerModal 
                            profs={profs}
                            onUpdateProfs={setProfs}
                            onClose={() => setShowProfManager(false)}
                        />
                    )}

                    {showSaveModal && (
                        <SaveModal 
                            fileName={saveFileName} 
                            setFileName={setSaveFileName} 
                            onClose={() => setShowSaveModal(false)} 
                            onConfirm={performSave} 
                        />
                    )}

                    {/* PIED DE PAGE */}
                    <footer className="bg-white border-t border-slate-200 py-4 mt-auto text-center text-xs text-slate-500 no-print shadow-inner">
                        <p className="font-bold tracking-wide">
                            LOGI-ORAL V16 - PERDIR<span className="text-blue-600">FORMANCE</span> © {new Date().getFullYear()} - Conçu pour les EPLE par Yannis CHRISTON
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
