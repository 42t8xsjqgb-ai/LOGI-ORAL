                                <div className="flex gap-6 h-[calc(100vh-280px)]">
                                    <div className="w-1/4 bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col">
                                        <div className="p-3 bg-gray-100 rounded-t-lg border-b border-gray-200 font-bold flex justify-between items-center">
                                            <span>Liste d'Attente</span>
                                            <span className="text-xs font-normal bg-gray-200 px-2 py-0.5 rounded-full">
                                                {pool.length}
                                            </span>
                                        </div>
                                        
                                        <div className="p-2 bg-white border-b border-gray-200">
                                            <div className="relative">
                                                <input 
                                                    type="text" 
                                                    placeholder="Rechercher élève..." 
                                                    className="w-full border rounded-lg pl-8 pr-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-100"
                                                    value={searchTerm}
                                                    onChange={e => setSearchTerm(e.target.value)}
                                                />
                                                <Search size={14} className="absolute left-2.5 top-2.5 text-gray-400" />
                                                {searchTerm && (
                                <button onClick={() => setSearchTerm("")} className="absolute right-2 top-2 text-gray-400 hover:text-gray-600">&times;</button>
                            )}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-3 bg-gray-50">
                        {pool
                            .filter(s => 
                                !searchTerm || 
                                s.NOM.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                s.PRENOM.toLowerCase().includes(searchTerm.toLowerCase())
                            )
                            .map(student => (
                            <StudentCard 
                                key={student.id} 
                                student={student} 
                                draggable={true}
                                examSettings={settings}
                                onDragStart={(e) => e.dataTransfer.setData("student", JSON.stringify(student))}
                                onGeneralEdit={openGeneralEditModal}
                                onDelete={student.isBreak ? (id) => setPool(prev => prev.filter(s => s.id !== id)) : undefined}
                            />
                        ))}
                        {pool.length === 0 && <div className="text-center text-gray-400 mt-10 italic">Aucun élève en attente.</div>}
                    </div>
                </div>

                <div className="w-3/4 flex flex-col h-full overflow-hidden">
                    {/* BARRE DE DÉFILEMENT SUPÉRIEURE */}
                    <div 
                        ref={topScrollRef} 
                        className="overflow-x-auto overflow-y-hidden horizontal-scrollbar mb-2 flex-shrink-0 bg-white border border-slate-200 rounded-lg shadow-sm" 
                        onScroll={handleTopScroll}
                        style={{ height: '14px' }}
                    >
                        <div style={{ width: juriesWidth, height: '1px' }}></div>
                    </div>

                    {/* ZONE PRINCIPALE DES JURYS */}
                    <div 
                        ref={mainScrollRef}
                        className="overflow-x-auto pb-4 flex-1 horizontal-scrollbar"
                        onScroll={handleMainScroll}
                    >
                        <div className="flex gap-4 h-full min-w-max" ref={contentRef}>
                            {Object.values(juries).map(jury => (
                                <JuryColumn
                                    key={jury.id}
                                    juryId={jury.id}
                                    juryData={jury}
                                    profs={profs}
                                    onUpdateJury={updateJury}
                                    onDropStudent={handleDropStudentToJury}
                                    onRemoveStudent={removeStudentFromJury}
                                    onMoveStudent={moveStudent}
                                    onUpdateStudentDuration={handleUpdateStudentInJury}
                                    onAddJuryChange={handleAddJuryChange}
                                    onUpdateJuryChange={handleUpdateJuryChange}
                                    onAddJuryBreak={handleAddJuryBreak}
                                    startTime={settings.startTime}
                                    examSettings={settings}
                                    onGeneralEdit={openGeneralEditModal}
                                />
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        </>
                        )}
                    </main>

                    <footer className="bg-slate-50 border-t border-slate-200 p-4 text-center text-xs text-slate-400 flex justify-center items-center no-print mt-auto">
                        <span className="font-bold text-slate-600">Outil proposé par Yannis CHRISTON - LOGI-ORAL+ V5 2026 | Les données sont sauvegardées localement. Respecte la RGPD.</span>
                    </footer>

                    {showPrint && (
                        <PrintView 
                            onClose={() => setShowPrint(false)}
                            juries={juries}
                            profs={profs}
                            settings={settings}
                            schoolName={schoolName}
                            schoolCity={schoolCity}
                            schoolLogo={schoolLogo}
                            schoolStamp={schoolStamp}
                            sessionYear={sessionYear} 
                            templates={templates}
                            setTemplates={setTemplates}
                        />
                    )}

                    {showGeneralEditModal && currentStudentForGeneralEdit && (
                        <GeneralStudentEditModal 
                            student={currentStudentForGeneralEdit}
                            onClose={() => setShowGeneralEditModal(false)}
                            onSave={saveGeneralStudent}
                        />
                    )}

                    {showSaveModal && (
                        <SaveModal 
                            fileName={saveFileName} 
                            setFileName={setSaveFileName} 
                            onClose={() => setShowSaveModal(false)} 
                            onConfirm={performSave} 
                        />
                    )}

                    {showProfManager && (
                        <ProfManagerModal 
                            profs={profs} 
                            setProfs={setProfs} 
                            onClose={() => setShowProfManager(false)} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
